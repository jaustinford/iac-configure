---
ansible_lint:
  image:
    name: $ELISE_CI_NEXUS_PROXY/cytopia/ansible-lint:latest-manifest-linux-amd64
    entrypoint:
      - /bin/sh
      - -c
  stage: lint
  needs:
    - secret_detection
  script:
    - echo "$ELISE_GROUP_VAULT_PASSWORD" > /root/.vault.password
    - ansible-lint $CI_PROJECT_DIR/ansible/site.yml

ansible_playbook:
  image:
    name: $ELISE_CI_NEXUS_HOSTED/elise/elysianskies-configure:$CI_COMMIT_REF_SLUG
  stage: deploy
  needs:
    - ansible_lint
  script:
    - echo "$ELISE_GROUP_VAULT_PASSWORD" > /root/.vault.password
    - echo "$ELISE_GROUP_B64_SSH_KEY" | base64 -d > /root/ssh.key
    - chmod 600 /root/ssh.key
    - |
      ansible-playbook -vv \
          /etc/ansible/site.yml
