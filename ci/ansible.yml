---
playbook_site:
  image:
    name: $ELISE_CI_NEXUS_HOSTED/elise/elysianskies-configure:$CI_COMMIT_REF_SLUG
  stage: deploy
  script:
    - echo "$ELISE_GROUP_VAULT_PASSWORD" > /root/.vault.password
    - echo "$ELISE_GROUP_B64_SSH_KEY" | base64 -d > /root/ssh.key
    - chmod 600 /root/ssh.key
    - |
      ansible-playbook -vv \
          /etc/ansible/site.yml
