---
playbook_site:
  image:
    name: $ELISE_CI_NEXUS_HOSTED/elise/elysianskies-configure:$CI_COMMIT_REF_SLUG
  stage: deploy
  script:
    - echo "$ELISE_PROJECT_VAULT_PASSWORD" > /root/.vault.password
    - |
      ansible-vault decrypt \
          --vault-password-file /root/.vault.password \
          --output /root/ssh.key \
          /root/ssh.key
    - |
      ansible-playbook -vv \
          /etc/ansible/site.yml
