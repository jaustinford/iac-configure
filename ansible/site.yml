---
- name: SITE - import up playbook
  import_playbook: up.yml
  vars:
    execute_mode: "{{ execute_modes.up }}"
  when: lookup('env', 'PLAYBOOK_SITE_MODE') == "up"

- name: SITE - import down playbook
  import_playbook: down.yml
  vars:
    execute_mode: "{{ execute_modes.down }}"
  when: lookup('env', 'PLAYBOOK_SITE_MODE') == "down"
