---
- name: SITE - import up playbook
  import_playbook: up.yml
  vars:
    cycle_mode: "{{ cycles.up }}"
  when: lookup('env', 'CYCLE_MODE') == "up"

- name: SITE - import down playbook
  import_playbook: down.yml
  vars:
    cycle_mode: "{{ cycles.down }}"
  when: lookup('env', 'CYCLE_MODE') == "down"
