[defaults]
host_key_checking   = False
force_color         = True
vault_password_file = /root/.vault.password
gathering           = explicit
any_errors_fatal    = True
inventory           = /etc/ansible_hosts

[colors]
ok          = purple
changed     = bright purple

deprecate   = bright gray
unreachable = bright gray
warn        = bright gray
error       = blue

skip        = dark gray
ignore      = dark gray
verbose     = dark gray
