[defaults]
host_key_checking   = False
force_color         = True
vault_password_file = /root/.vault.password
gathering           = explicit
any_errors_fatal    = True

[colors]
ok          = magenta
changed     = bright magenta

deprecate   = bright gray
unreachable = bright gray
warn        = bright gray
error       = green

skip        = dark gray
ignore      = dark gray
verbose     = dark gray
