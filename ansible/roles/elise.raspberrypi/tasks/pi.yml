---
- name: PI - ensure configurations
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    line: "{{ item.line }}"
    regexp: "{{ item.regexp }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  notify: MAIN - reboot
  become: true
  with_items:
    - path: /boot/firmware/config.txt
      line: dtoverlay=disable-wifi
      regexp: "^"
      owner: root
      group: root
      mode: '0755'

    - path: /etc/cloud/cloud.cfg
      line: "  #- update_etc_hosts"
      regexp: "^  - update_etc_hosts"
      owner: root
      group: root
      mode: '0644'
