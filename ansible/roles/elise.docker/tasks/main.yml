---
- name: MAIN - add docker apt repository source
  ansible.builtin.template:
    src: docker.list
    dest: /etc/apt/sources.list.d/docker.list
    owner: root
    group: root
    mode: '0644'
  become: true

- name: MAIN - add docker apt repository key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/trusted.gpg.d/docker.asc
    owner: root
    group: root
    mode: '0644'
  become: true
  when: internet_found == 'yes'

- name: MAIN - install docker packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update_cache: true
  become: true
  when: internet_found == 'yes'
  with_items:
    - "{{ docker.ubuntu_packages }}"

- name: MAIN - manage docker configuration
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  become: true
  notify: MAIN - systemctl restart docker
  with_items:
    - src: docker.service
      dest: /lib/systemd/system/docker.service
      owner: root
      group: root
      mode: '0644'

    - src: daemon.json
      dest: /etc/docker/daemon.json
      owner: root
      group: root
      mode: '0644'

    - src: config.json
      dest: "{{ folder_secrets_docker }}/config.json"
      owner: "{{ names.users.host.admin.name }}"
      group: "{{ names.users.host.admin.name }}"
      mode: '0600'

- name: MAIN - flush handlers
  ansible.builtin.meta: flush_handlers

- name: MAIN - ensure docker daemon
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  become: true
