---
runner:
  url: "http://{{ gitlab_vlan_40_address }}:{{ ports.gitlab_web }}"
  clone_url: "http://{{ gitlab_vlan_40_address }}:{{ ports.gitlab_web }}"
  executor: docker
  docker_image: "{{ nexus_vlan_40_address }}:{{ ports.nexus_docker_proxy }}/docker:28-dind"
  description: lab_runner
  docker_privileged: "true"
  docker_volumes:
    - /var/run/docker.sock:/var/run/docker.sock:rw
    - /root/.docker:/root/.docker:rw
    - /root/approle:/approle:ro
    - /root/ansible-vault-mount.txt:/root/ansible-vault-mount.txt:ro
    - /root/ansible-vault-mount.txt:/root/ansible-vault-password.txt:ro
    - /root/ansible-ssh.key:/root/ansible-ssh.key:ro
    - "/root/smb/mounts/{{ names.raid_vol.name }}-green:/tfstate:rw"
    - "/root/smb/mounts/{{ names.raid_vol.name }}-red:/plex_libraries:rw"
