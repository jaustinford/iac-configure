  clone_url: "http://{{ assignments.gitlab.networking.teine.ipv4 }}:{{ external_ports.gitlab_web }}"
  executor: docker
  docker_image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/docker:28-dind"
  description: elysianskies_runner
  docker_privileged: "true"
  docker_volumes:
    - /var/run/docker.sock:/var/run/docker.sock:rw
