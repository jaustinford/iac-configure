client_id               = "{{ oauth.client_id }}"
client_secret           = "{{ secrets.oauth.client_secret }}"
cookie_csrf_expire      = "5m"
cookie_csrf_per_request = true
cookie_expire           = "30m"
cookie_domains          = "home.elysianskies.com"
cookie_secret           = "{{ secrets.oauth.cookie_secret }}"
cookie_samesite         = "lax"
code_challenge_method   = "S256"
email_domains           = "*"
http_address            = "0.0.0.0:4180"
oidc_issuer_url         = "https://keycloak.home.elysianskies.com/realms/elysian-skies"
provider                = "keycloak-oidc"
redirect_url            = "https://oauth.home.elysianskies.com/oauth2/callback"
redis_connection_url    = "redis://{{ assignments.redis.networking.teine.ipv4 }}:{{ external_ports.redis_db }}"
redis_password          = "{{ secrets.oauth.redis_password }}"
reverse_proxy           = true
session_store_type      = "redis"
whitelist_domains       = "*.home.elysianskies.com"
skip_provider_button    = true
