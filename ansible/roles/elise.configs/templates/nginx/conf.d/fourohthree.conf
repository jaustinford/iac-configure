server {
    server_name fourohthree.home.elysianskies.com;
    listen      443 ssl;

    location / {
        proxy_pass http://{{ assignments.fourohthree.networking.teine.ipv4 }}:{{ external_ports.fourohthree_web }};
    }
}

server {
    server_name fourohthree.{{ assignments.nginx.networking.teine.fqdn }};
    listen      443 ssl;

    if ($http_x_portal) {
        return 301 https://fourohfour.home.elysianskies.com;
    }

    location / {
        proxy_pass http://{{ assignments.fourohthree.networking.teine.ipv4 }}:{{ external_ports.fourohthree_web }};
    }
}
