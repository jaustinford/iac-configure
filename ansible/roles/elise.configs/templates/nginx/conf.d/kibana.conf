server {
    server_name      kibana.home.elysianskies.com;
    listen           443           ssl;

    if ($allowed_country = no) {
        return 301 $scheme://fourohthree.home.elysianskies.com;
    }

    location / {
        proxy_pass   http://{{ assignments.kibana.networking.teine.ipv4 }}:{{ external_ports.kibana_web }};
        auth_request /oauth2/auth;
    }

    location /oauth2/ {
        proxy_pass http://{{ assignments.oauth.networking.teine.ipv4 }}:{{ external_ports.oauth_web }}/oauth2/;
    }
}

server {
    server_name kibana.{{ assignments.nginx.networking.teine.fqdn }};
    listen      443 ssl;

    location / {
        proxy_pass http://{{ assignments.kibana.networking.teine.ipv4 }}:{{ external_ports.kibana_web }};
    }
}
