server {
    server_name deluge.home.elysianskies.com;
    listen      443 ssl;

    if ($allowed_country = no) {
        return 301 $scheme://fourohthree.home.elysianskies.com;
    }

    location / {
        proxy_pass      http://{{ assignments.deluge.networking.teine.ipv4 }}:{{ external_ports.expressvpn_deluge }};
        auth_request    /oauth2/auth;
        sub_filter
        '</head>'
        '<link rel="stylesheet" type="text/css" href="https://halianelf.github.io/Deluge-Dark/deluge.css">
        </head>';
        sub_filter_once on;
    }

    location /oauth2/ {
        proxy_pass http://{{ assignments.oauth.networking.teine.ipv4 }}:{{ external_ports.oauth_web }}/oauth2/;
    }
}

server {
    server_name deluge.{{ assignments.nginx.networking.teine.fqdn }};
    listen      443 ssl;

    if ($http_x_portal) {
        return 301 https://fourohfour.home.elysianskies.com;
    }

    location / {
        proxy_pass      http://{{ assignments.deluge.networking.teine.ipv4 }}:{{ external_ports.expressvpn_deluge }};
        sub_filter
        '</head>'
        '<link rel="stylesheet" type="text/css" href="https://halianelf.github.io/Deluge-Dark/deluge.css">
        </head>';
        sub_filter_once on;
    }
}
