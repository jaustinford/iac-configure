server {
    server_name gateway-lan.home.elysianskies.com;
    listen      443 ssl;

    if ($allowed_country = no) {
        return 301 $scheme://fourohthree.home.elysianskies.com;
    }

    if ($allowed_city = no) {
        return 301 $scheme://fourohthree.home.elysianskies.com;
    }

    location / {
        proxy_pass   http://172.16.13.1:80;
        auth_request /oauth2/auth;
    }

    location /oauth2/ {
        proxy_pass http://{{ assignments.oauth.networking.teine.ipv4 }}:{{ external_ports.oauth_web }}/oauth2/;
    }
}

server {
    server_name gateway-lan.{{ assignments.nginx.networking.teine.fqdn }};
    listen      443 ssl;

    location / {
        proxy_pass http://172.16.13.1:80;
    }
}
