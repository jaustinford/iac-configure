server {
    server_name plex.home.elysianskies.com;
    listen      443 ssl;

    if ($allowed_country = no) {
        return 301 $scheme://fourohthree.home.elysianskies.com;
    }

    location / {
        proxy_pass http://{{ assignments.plex.networking.teine.ipv4 }}:{{ external_ports.plex_web }};
    }
}

server {
    server_name plex.{{ assignments.nginx.networking.teine.fqdn }};
    listen      443 ssl;

    location / {
        proxy_pass http://{{ assignments.plex.networking.teine.ipv4 }}:{{ external_ports.plex_web }};
    }
}
