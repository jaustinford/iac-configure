server {
    server_name resume.home.elysianskies.com;
    listen      443 ssl;

    location / {
        proxy_pass http://{{ assignments.resume.networking.teine.ipv4 }}:{{ external_ports.resume_web }};
    }

    location /api/public/dl {
        proxy_pass http://{{ assignments.filebrowser.networking.teine.ipv4 }}:{{ external_ports.filebrowser_web }}/api/public/dl;
    }
}

server {
    server_name resume.{{ assignments.nginx.networking.teine.fqdn }};
    listen      443 ssl;

    if ($http_x_portal) {
        return 301 https://fourohfour.home.elysianskies.com;
    }

    location / {
        proxy_pass http://{{ assignments.resume.networking.teine.ipv4 }}:{{ external_ports.resume_web }};
    }

    location /api/public/dl {
        proxy_pass http://{{ assignments.filebrowser.networking.teine.ipv4 }}:{{ external_ports.filebrowser_web }}/api/public/dl;
    }
}
