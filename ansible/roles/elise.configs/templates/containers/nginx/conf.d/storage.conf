server {
    server_name storage.{{ lab.domain }};
    listen      443 ssl;

    if ($allowed_country = no) {
        return 403;
    }

    if ($allowed_city = no) {
        return 403;
    }

    location / {
        proxy_pass   https://{{ nas_vlan_40_address }}:443;
        auth_request /oauth2/auth;
    }

    location /oauth2/ {
        proxy_pass http://{{ oauth_vlan_40_address }}:{{ ports.oauth_web }}/oauth2/;
    }
}

server {
    server_name storage.{{ nginx_vlan_40_fqdn }};
    listen      443 ssl;

    if ($http_x_portal) {
        return 404;
    }

    location / {
        proxy_pass https://{{ nas_vlan_40_address }}:443;
    }
}
