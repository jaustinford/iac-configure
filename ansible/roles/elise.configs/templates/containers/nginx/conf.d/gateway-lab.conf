server {
    server_name gateway-lab.proxy-ext.{{ lab.domain }} gateway-lab.{{ lab.domain }};
    listen      443 ssl;

    if ($allowed_country = no) {
        return 403;
    }

    if ($allowed_city = no) {
        return 403;
    }

    location / {
        proxy_pass   http://192.168.30.6:80;
        auth_request /oauth2/auth;
    }

    location /oauth2/ {
        proxy_pass http://{{ oauth_vlan_40_address }}:{{ ports.oauth_web }}/oauth2/;
    }

    location /oauth2/auth {
        proxy_pass http://{{ oauth_vlan_40_address }}:{{ ports.oauth_web }}/oauth2/auth?allowed_groups=partners;
        error_page 403 = $scheme://fourohthree.{{ lab.domain }};
    }
}

server {
    server_name gateway-lab.proxy-int.{{ lab.domain }};
    listen      443 ssl;

    if ($http_x_portal) {
        return 404;
    }

    location / {
        proxy_pass http://192.168.30.6:80;
    }
}
