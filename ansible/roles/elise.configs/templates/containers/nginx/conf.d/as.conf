server {
    server_name as.proxy-ext.{{ lab.domain }} as.{{ lab.domain }};
    listen      443 ssl;

    if ($allowed_country = no) {
        return 403;
    }

    location / {
        proxy_pass   https://{{ openvpnas_vlan_40_address }}:{{ ports.openvpnas_web }};
        auth_request /oauth2/auth;
    }

    location /oauth2/ {
        proxy_pass http://{{ oauth_vlan_40_address }}:{{ ports.oauth_web }}/oauth2/;
    }
}

server {
    server_name as.proxy-int.{{ lab.domain }};
    listen      443 ssl;

    if ($http_x_portal) {
        return 404;
    }

    location / {
        proxy_pass https://{{ openvpnas_vlan_40_address }}:{{ ports.openvpnas_web }};
    }
}
