server {
    server_name fourohfour.{{ lab.domain }};
    listen      443 ssl;

    location / {
        proxy_pass http://{{ fourohfour_vlan_40_address }}:{{ ports.fourohfour_web }};
    }
}

server {
    server_name fourohfour.{{ nginx_vlan_40_fqdn }};
    listen      443 ssl;

    if ($http_x_portal) {
        return 404;
    }

    location / {
        proxy_pass http://{{ fourohfour_vlan_40_address }}:{{ ports.fourohfour_web }};
    }
}
