server {
    server_name docs.{{ lab.domain }} docs.proxy-ext.{{ lab.domain }};
    listen      443 ssl;

    if ($general_allowed_country = no) {
        return 403;
    }

    location / {
        proxy_pass http://{{ docs_vlan_40_address }}:{{ ports.docs_web }};
    }

{% for restricted_page in nginx.docs.restricted_pages %}
    location /{{ restricted_page.name }} {
        proxy_pass   http://{{ docs_vlan_40_address }}:{{ ports.docs_web }};
        set          $docs_allowed_groups {{ restricted_page.group }};
        auth_request /oauth2/auth;
    }

{% endfor %}
    location /oauth2/ {
        proxy_pass http://{{ oauth_vlan_40_address }}:{{ ports.oauth_web }}/oauth2/;
    }

    location /oauth2/auth {
        proxy_pass http://{{ oauth_vlan_40_address }}:{{ ports.oauth_web }}/oauth2/auth?allowed_groups=$docs_allowed_groups;
        error_page 403 = $scheme://fourohthree.{{ lab.domain }};
    }
}

server {
    server_name docs.proxy-int.{{ lab.domain }};
    listen      443 ssl;

    if ($http_x_portal) {
        return 404;
    }

    location / {
        proxy_pass http://{{ docs_vlan_40_address }}:{{ ports.docs_web }};
    }
}
