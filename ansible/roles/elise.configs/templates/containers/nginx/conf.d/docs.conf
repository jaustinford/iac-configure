server {
    server_name docs.home.elysianskies.com;
    listen      443 ssl;

    if ($allowed_country = no) {
        return 403;
    }

    location / {
        proxy_pass   http://{{ assignments.docs.networking.teine.ipv4 }}:{{ external_ports.docs_web }};
    }

{% for restricted_page in nginx.docs.restricted_pages %}
    location /{{ restricted_page }} {
        proxy_pass   http://{{ assignments.docs.networking.teine.ipv4 }}:{{ external_ports.docs_web }};
        auth_request /oauth2/auth;
    }

{% endfor %}
    location /oauth2/ {
        proxy_pass http://{{ assignments.oauth.networking.teine.ipv4 }}:{{ external_ports.oauth_web }}/oauth2/;
    }
}

server {
    server_name docs.{{ assignments.nginx.networking.teine.fqdn }};
    listen      443 ssl;

    if ($http_x_portal) {
        return 404;
    }

    location / {
        proxy_pass http://{{ assignments.docs.networking.teine.ipv4 }}:{{ external_ports.docs_web }};
    }
}
