server {
    server_name docs.{{ lab.domain }};
    listen      443 ssl;

    if ($allowed_country = no) {
        return 403;
    }

    location / {
        proxy_pass http://{{ docs_vlan_40_address }}:{{ ports.docs_web }};
    }

{% for restricted_page in nginx.docs.restricted_pages %}
    location /{{ restricted_page }} {
        proxy_pass   http://{{ docs_vlan_40_address }}:{{ ports.docs_web }};
        auth_request /oauth2/auth;
    }

{% endfor %}
    location /oauth2/ {
        proxy_pass http://{{ oauth_vlan_40_address }}:{{ ports.oauth_web }}/oauth2/;
    }
}

server {
    server_name docs.{{ nginx_vlan_40_fqdn }};
    listen      443 ssl;

    if ($http_x_portal) {
        return 404;
    }

    location / {
        proxy_pass http://{{ docs_vlan_40_address }}:{{ ports.docs_web }};
    }
}
