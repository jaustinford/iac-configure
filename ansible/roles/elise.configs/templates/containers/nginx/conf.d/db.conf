server {
    server_name db.{{ lab.domain }};
    listen      443 ssl;

    if ($allowed_country = no) {
        return 403;
    }

    location / {
        proxy_pass   http://{{ elasticsearch_vlan_40_address }}:{{ ports.elasticsearch_db }};
        auth_request /oauth2/auth;
    }

    location /oauth2/ {
        proxy_pass http://{{ oauth_vlan_40_address }}:{{ ports.oauth_web }}/oauth2/;
    }
}

server {
    server_name db.{{ nginx_vlan_40_fqdn }};
    listen      443 ssl;

    set $external_client "N";

    if ($http_x_portal) {
        set $external_client "Y";
    }

    if ($http_x_real_ip != {{ lookup('ansible.builtin.file', '/tfstate/instance_portal_ip_address.txt') }}) {
        set $external_client "${external_client}Y";
    }

    if ($external_client = YY) {
        return 404;
    }

    location / {
        proxy_pass http://{{ elasticsearch_vlan_40_address }}:{{ ports.elasticsearch_db }};
    }
}
