server {
    server_name track-series.{{ lab.domain }} track-series.proxy-ext.{{ lab.domain }};
    listen      443 ssl;

    if ($general_allowed_country = no) {
        return 403;
    }

    location / {
        proxy_pass   http://{{ sonarr_vlan_40_address }}:{{ ports.gluetun_sonarr }};
        auth_request /oauth2/auth;
    }

    location /oauth2/ {
        proxy_pass http://{{ oauth_vlan_40_address }}:{{ ports.oauth_web }}/oauth2/;
    }

    location /oauth2/auth {
        proxy_pass http://{{ oauth_vlan_40_address }}:{{ ports.oauth_web }}/oauth2/auth?allowed_groups=partners;
        error_page 403 = $scheme://fourohthree.{{ lab.domain }};
    }

    location /api/ {
        proxy_pass http://{{ sonarr_vlan_40_address }}:{{ ports.gluetun_sonarr }}/api/;
    }
}

server {
    server_name track-series.proxy-int.{{ lab.domain }};
    listen      443 ssl;

    if ($http_x_portal) {
        return 404;
    }

    location / {
        proxy_pass http://{{ sonarr_vlan_40_address }}:{{ ports.gluetun_sonarr }};
    }
}
