server {
    server_name fiveohx.home.elysianskies.com;
    listen      443 ssl;

    location / {
        proxy_pass http://{{ assignments.fiveohx.networking.teine.ipv4 }}:{{ external_ports.fiveohx_web }};
    }
}

server {
    server_name fiveohx.{{ assignments.nginx.networking.teine.fqdn }};
    listen      443 ssl;

    if ($http_x_portal) {
        return 404;
    }

    location / {
        proxy_pass http://{{ assignments.fiveohx.networking.teine.ipv4 }}:{{ external_ports.fiveohx_web }};
    }
}
