dev tun
fast-io
persist-key
persist-tun
nobind
remote {{ expressvpn.server }}-ca-version-2.expressnetw.com 1195
remote-random
pull
comp-lzo no
tls-client
verify-x509-name Server name-prefix
ns-cert-type server
key-direction 1
route-method exe
route-delay 2
tun-mtu 1500
fragment 1300
mssfix 1200
verb 3
cipher AES-256-CBC
keysize 256
auth SHA512
sndbuf 524288
rcvbuf 524288
auth-user-pass /vpn/vpn.credentials
<cert>
{{ secrets.expressvpn.tls.cert }}
</cert>
<key>
{{ secrets.expressvpn.tls.key }}
</key>
<tls-auth>
{{ secrets.expressvpn.tls.auth }}
</tls-auth>
<ca>
{{ secrets.expressvpn.tls.ca }}
</ca>
