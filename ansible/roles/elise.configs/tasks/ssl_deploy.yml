---
- name: SSL_DEPLOY - fetch elysianskies tfstate
  delegate_to: localhost
  ansible.builtin.debug:
    msg: "{{ lookup('ansible.builtin.file', '/tmp/elysianskies.json') }}"
  no_log: true
  register: elysianskies_tfstate

- name: SSL_DEPLOY - copy ssl certificate
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode }}"
  become: true
  no_log: true
  notify: MAIN - docker restart nginx
  with_items:
    - content: |
        {{ elysianskies_tfstate.msg.outputs.tls_nginx_certificate_certificate_pem.value }}
        {{ elysianskies_tfstate.msg.outputs.tls_nginx_certificate_issuer_pem.value }}
      dest: /elysianskies/configurations/nginx/nginx.crt
      mode: '0644'

    - content: |
        {{ elysianskies_tfstate.msg.outputs.tls_nginx_certificate_private_key_pem.value }}
      dest: /elysianskies/configurations/nginx/nginx.crt.key
      mode: '0600'
