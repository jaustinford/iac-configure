---
- name: main - ensure config directory
  file:
    path: /elysianskies/configurations
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true

- include_tasks: directories.yml
  when: item.state == 'directory'
  with_community.general.filetree: ../templates

- include_tasks: templates.yml
  when: item.state == 'file'
  with_community.general.filetree: ../templates

- meta: flush_handlers

- include_tasks: ssl_discover.yml

- name: main - ensure geoip download directory
  file:
    path: "/home/{{ ansible_user }}/geoip"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true
  when:
    - ansible_hostname + "-teine.home.elysianskies.com" == assignments.nginx.networking.teine.fqdn

- include_tasks: maxmind.yml
  when:
    - maxmind.download == "yes"
    - ansible_hostname + "-teine.home.elysianskies.com" == assignments.nginx.networking.teine.fqdn
  with_items:
    - GeoLite2-ASN
    - GeoLite2-City
    - GeoLite2-Country
