---
- name: MAIN - ensure config directory
  ansible.builtin.file:
    path: /elysianskies/configurations
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true

- name: MAIN - include directories tasks
  ansible.builtin.include_tasks: directories.yml
  when: item.state == 'directory'
  with_community.general.filetree: ../templates

- name: MAIN - include templates tasks
  ansible.builtin.include_tasks: templates.yml
  when: item.state == 'file'
  with_community.general.filetree: ../templates

- name: MAIN - flush handlers
  ansible.builtin.meta: flush_handlers

- name: MAIN - include ssl_deploy tasks
  ansible.builtin.include_tasks: ssl_deploy.yml

- name: MAIN - ensure geoip download directory
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/geoip"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true
  when:
    - ansible_hostname + "-teine.home.elysianskies.com" == assignments.nginx.networking.teine.fqdn

- name: MAIN - rotate old geoip databases
  ansible.builtin.command: |
    find /home/{{ ansible_user }}/geoip -ctime +7 -exec rm -rf {} \;
  changed_when: false
  become: true
  when:
    - ansible_hostname + "-teine.home.elysianskies.com" == assignments.nginx.networking.teine.fqdn

- name: MAIN - include maxmind tasks
  ansible.builtin.include_tasks: maxmind.yml
  when:
    - maxmind.download == "true"
    - ansible_hostname + "-teine.home.elysianskies.com" == assignments.nginx.networking.teine.fqdn
  with_items:
    - GeoLite2-ASN
    - GeoLite2-City
    - GeoLite2-Country
