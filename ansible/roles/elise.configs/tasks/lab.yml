---
- name: LAB - ensure config directory
  ansible.builtin.file:
    path: "{{ lab.dirs.config }}"
    state: directory
    owner: "{{ lab.dirs.owner }}"
    group: "{{ lab.dirs.group }}"
    mode: "{{ lab.dirs.mode }}"
  become: true

- name: "LAB - resolve expressvpn server"
  delegate_to: localhost
  expressvpn_selector:
    continent: "{{ lookup('env', 'ELISE_PROJECT_EXPRESSVPN_CONTINENT') }}"
    region: "{{ lookup('env', 'ELISE_PROJECT_EXPRESSVPN_REGION') }}"
    country: "{{ lookup('env', 'ELISE_PROJECT_EXPRESSVPN_COUNTRY') }}"
    server: "{{ lookup('env', 'ELISE_PROJECT_EXPRESSVPN_SERVER') }}"
  register: expressvpn_selected_server

- name: LAB - include directories tasks
  ansible.builtin.include_tasks: directories.yml
  when: item.state == 'directory'
  with_community.general.filetree: ../templates/containers

- name: LAB - include templates tasks
  ansible.builtin.include_tasks: templates.yml
  when: item.state == 'file'
  with_community.general.filetree: ../templates/containers

- name: LAB - flush handlers
  ansible.builtin.meta: flush_handlers

- name: LAB - include ssl_deploy tasks
  ansible.builtin.include_tasks: ssl_deploy.yml

- name: LAB - include maxmind tasks
  ansible.builtin.include_tasks: maxmind.yml
  when:
    - inventory_hostname == assignments.nginx.host
    - maxmind.download == "true"
