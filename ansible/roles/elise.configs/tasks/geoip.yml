---
- name: GEOIP - download database
  ansible.builtin.get_url:
    url: "https://download.maxmind.com/app/geoip_download?edition_id={{ item }}&license_key={{ secrets.maxmind.license_key }}&suffix=tar.gz"
    dest: "{{ ansible_user_dir }}/geoip"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: GEOIP - discover directory
  ansible.builtin.command: |
    /bin/bash -c '
      find {{ ansible_user_dir }}/geoip -type f -name '*.tar.gz' \
        | grep '{{ item }}' \
        | sort \
        | tail -1 \
        | cut -d '/' -f5 \
        | cut -d '.' -f1
    '
  register: db_directory
  changed_when: false

- name: GEOIP - unarchive database
  ansible.builtin.unarchive:
    src: "{{ ansible_user_dir }}/geoip/{{ db_directory.stdout }}.tar.gz"
    dest: "{{ ansible_user_dir }}/geoip"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
    remote_src: true
  become: true

- name: GEOIP - move database
  ansible.builtin.copy:
    src: "{{ ansible_user_dir }}/geoip/{{ db_directory.stdout }}/{{ item }}.mmdb"
    dest: "/elysianskies/application_data/nginx/geoip/{{ item }}.mmdb"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
    remote_src: true
  become: true
