---
- name: "TEMPLATES - copy container template {{ item.path }}"
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/elysianskies/configurations/{{ item.path }}"
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true
  notify: "MAIN - docker restart {{ item.path.split('/')[0] }}"
