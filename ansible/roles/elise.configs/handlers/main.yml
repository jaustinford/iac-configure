---
- name: MAIN - docker restart pihole
  ansible.builtin.command: |
    /bin/bash -c "
      if [ ! -z \"$(docker ps --quiet --filter status=running --filter name=pihole)\" ]; then
        docker restart pihole
      fi
    "
  become: true
  when: inventory_hostname == assignments.pihole.host
  changed_when: false

- name: MAIN - docker restart nginx
  ansible.builtin.command: |
    /bin/bash -c "
      if [ ! -z \"$(docker ps --quiet --filter status=running --filter name=nginx)\" ]; then
        echo '{{ secrets.lab_users[inventory_hostname].privileged }}' | sudo -S systemctl stop tunnel-nginx
        docker restart nginx
        echo '{{ secrets.lab_users[inventory_hostname].privileged }}' | sudo -S systemctl start tunnel-nginx
      fi
    "
  no_log: true
  become: true
  when: inventory_hostname == assignments.nginx.host
  changed_when: false

