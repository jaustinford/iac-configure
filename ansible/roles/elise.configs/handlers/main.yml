- name: MAIN - docker restart nginx
  ansible.builtin.command: |
    /bin/bash -c "
      if [ ! -z \"$(docker ps --quiet --filter status=running --filter name=nginx)\" ]; then
        echo '{{ secrets.users.host.iac[inventory_hostname] }}' | sudo -S systemctl stop tunnel-nginx
        docker restart nginx
        echo '{{ secrets.users.host.iac[inventory_hostname] }}' | sudo -S systemctl start tunnel-nginx
      fi
    "
  no_log: true
  become: true
  when: inventory_hostname == assignments.nginx.host
  changed_when: false

