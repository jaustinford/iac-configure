---
- name: MAIN - docker restart elasticsearch
  ansible.builtin.command: |
    /bin/bash -c "
      if [ ! -z \"$(docker ps --quiet --filter status=running --filter name=elasticsearch)\" ]; then
        docker restart elasticsearch
      fi
    "
  become: true
  when: inventory_hostname == assignments.elasticsearch.host
  changed_when: false

