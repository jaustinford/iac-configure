---
lab_users:
  superuser:
    colors:
      primary: red
      secondary: white
      tertiary: lightgrey
      vim: elflord

  privileged:
    colors:
      primary: purple
      secondary: white
      tertiary: lightgrey
      vim: elflord
    state: present
    public_key: "ssh-rsa  {{ names.lab_users.privileged }}@{{ lab.domain }}"

  nonprivileged:
    colors:
      primary: blue
      secondary: white
      tertiary: lightgrey
      vim: elflord
    state: present
    public_key: "ssh-rsa  {{ names.lab_users.nonprivileged }}@{{ lab.domain }}"
