---
- name: PRIVILEGED - manage privileged user
  ansible.builtin.user:
    name: "{{ names.users.privileged }}"
    shell: /bin/bash
    uid: "{{ host_users.privileged.uid }}"
    state: "{{ role_users.privileged.state }}"
    groups: sudo
    force: true
    remove: true
  become: true

- name: PRIVILEGED - manage privileged user password
  ansible.builtin.user:
    name: "{{ names.users.privileged }}"
    password: "{{ secrets.users[inventory_hostname].privileged | password_hash('sha512') }}"
  become: true
  changed_when: false
  when: role_users.privileged.state == "present"

- name: PRIVILEGED - copy privileged user ssh key
  ansible.posix.authorized_key:
    user: "{{ names.users.privileged }}"
    key: "{{ role_users.privileged.public_key }}"
    state: present
  when: role_users.privileged.state == "present"
  become: true
