---
- name: MOUNT - ensure glusterfs mount path
  ansible.builtin.file:
    path: "{{ glusterfs.dfs.path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  become: true

- name: MOUNT - mount glusterfs volume
  ansible.posix.mount:
    fstype: glusterfs
    src: "{{ ansible_eno1.ipv4.address }}:{{ glusterfs.dfs.name }}"
    opts: defaults
    path: "{{ glusterfs.dfs.path }}"
    state: "{{ glusterfs.mount.state }}"
  become: true
