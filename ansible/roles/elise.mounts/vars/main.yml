---
xcalibr_gid: 32600
cifs_globals: uid=0,gid={{ xcalibr_gid }},dir_mode=0770,file_mode=0660

mounts:

    ###########################################################
    # xcalibr
    ###########################################################

  - host: docker02
    fstype: cifs
    owner: "{{ secrets.docker02.superuser.username }}"
    group: rountable
    mode: "0770"
    src: "//192.168.20.5/{{ secrets.nas.xcalibr_root_ro.username[:-3] }}"
    opts: "username={{ secrets.nas.xcalibr_root_ro.username }},password={{ secrets.nas.xcalibr_root_ro.password }},{{ cifs_globals }}"
    path: "/mnt/{{ secrets.nas.xcalibr_root_ro.username }}"
    state: "{{ cycle_mode.volumes.xcalibr }}"

  - host: docker01
    fstype: cifs
    owner: "{{ secrets.docker01.superuser.username }}"
    group: rountable
    mode: "0770"
    src: "//192.168.20.5/{{ secrets.nas.xcalibr_plex_ro.username[:-3] }}"
    opts: "username={{ secrets.nas.xcalibr_plex_ro.username }},password={{ secrets.nas.xcalibr_plex_ro.password }},{{ cifs_globals }}"
    path: "/mnt/{{ secrets.nas.xcalibr_plex_ro.username }}"
    state: "{{ cycle_mode.volumes.xcalibr }}"

  - host: docker02
    fstype: cifs
    owner: "{{ secrets.docker02.superuser.username }}"
    group: rountable
    mode: "0770"
    src: "//192.168.20.5/{{ secrets.nas.xcalibr_plex_rw.username[:-3] }}"
    opts: "username={{ secrets.nas.xcalibr_plex_rw.username }},password={{ secrets.nas.xcalibr_plex_rw.password }},{{ cifs_globals }}"
    path: "/mnt/{{ secrets.nas.xcalibr_plex_rw.username }}"
    state: "{{ cycle_mode.volumes.xcalibr }}"

  - host: docker01
    fstype: cifs
    owner: "{{ secrets.docker01.superuser.username }}"
    group: rountable
    mode: "0770"
    src: "//192.168.20.5/{{ secrets.nas.xcalibr_deluge_rw.username[:-3] }}"
    opts: "username={{ secrets.nas.xcalibr_deluge_rw.username }},password={{ secrets.nas.xcalibr_deluge_rw.password }},{{ cifs_globals }}"
    path: "/mnt/{{ secrets.nas.xcalibr_deluge_rw.username }}"
    state: "{{ cycle_mode.volumes.xcalibr }}"

  - host: docker02
    fstype: cifs
    owner: "{{ secrets.docker02.superuser.username }}"
    group: rountable
    mode: "0770"
    src: "//192.168.20.5/{{ secrets.nas.xcalibr_deluge_rw.username[:-3] }}"
    opts: "username={{ secrets.nas.xcalibr_deluge_rw.username }},password={{ secrets.nas.xcalibr_deluge_rw.password }},{{ cifs_globals }}"
    path: "/mnt/{{ secrets.nas.xcalibr_deluge_rw.username }}"
    state: "{{ cycle_mode.volumes.xcalibr }}"

  - host: docker02
    fstype: cifs
    owner: "{{ secrets.docker02.superuser.username }}"
    group: rountable
    mode: "0770"
    src: "//192.168.20.5/{{ secrets.nas.xcalibr_tf_rw.username[:-3] }}"
    opts: "username={{ secrets.nas.xcalibr_tf_rw.username }},password={{ secrets.nas.xcalibr_tf_rw.password }},{{ cifs_globals }}"
    path: "/mnt/{{ secrets.nas.xcalibr_tf_rw.username }}"
    state: "{{ cycle_mode.volumes.xcalibr }}"

    ###########################################################
    # glusterfs
    ###########################################################

  - host: docker01
    fstype: ext4
    src: /dev/mapper/ubuntu--vg-dfs_lvm
    owner: "{{ secrets.docker01.superuser.username }}"
    group: "{{ secrets.docker01.superuser.username }}"
    mode: "0755"
    opts: defaults
    path: /mnt/dfs_lvm
    state: "{{ cycle_mode.volumes.dfs_lvm }}"

  - host: docker02
    fstype: ext4
    src: /dev/mapper/ubuntu--vg-dfs_lvm
    owner: "{{ secrets.docker02.superuser.username }}"
    group: "{{ secrets.docker02.superuser.username }}"
    mode: "0755"
    opts: defaults
    path: /mnt/dfs_lvm
    state: "{{ cycle_mode.volumes.dfs_lvm }}"
