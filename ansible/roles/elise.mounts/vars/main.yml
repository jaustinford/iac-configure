---
mounts:
  samba:
    - host: "{{ names.hosts.docker01 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.raid }}"
      src: "//{{ nas_vlan_20_address }}/{{ names.raid }}-black"
      path: "{{ folder_raid }}/{{ names.raid }}-black_rw"
      username: "{{ names.users.raid.black_rw }}"
      password: "{{ secrets.users.raid.black_rw }}"
      dir_mode: "0770"
      file_mode: "0660"

    - host: "{{ names.hosts.docker01 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.raid }}"
      src: "//{{ nas_vlan_20_address }}/{{ names.raid }}-red"
      path: "{{ folder_raid }}/{{ names.raid }}-red_rw"
      username: "{{ names.users.raid.red_rw }}"
      password: "{{ secrets.users.raid.red_rw }}"
      dir_mode: "0770"
      file_mode: "0660"

    - host: "{{ names.hosts.docker02 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.raid }}"
      src: "//{{ nas_vlan_20_address }}/{{ names.raid }}-blue"
      path: "{{ folder_raid }}/{{ names.raid }}-blue_ro"
      username: "{{ names.users.raid.blue_ro }}"
      password: "{{ secrets.users.raid.blue_ro }}"
      dir_mode: "0750"
      file_mode: "0640"

    - host: "{{ names.hosts.docker01 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.raid }}"
      src: "//{{ nas_vlan_20_address }}/{{ names.raid }}-green"
      path: "{{ folder_raid }}/{{ names.raid }}-green_rw"
      username: "{{ names.users.raid.green_rw }}"
      password: "{{ secrets.users.raid.green_rw }}"
      dir_mode: "0770"
      file_mode: "0660"

    - host: "{{ names.hosts.docker02 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.raid }}"
      src: "//{{ nas_vlan_20_address }}/{{ names.raid }}-red"
      path: "{{ folder_raid }}/{{ names.raid }}-red_ro"
      username: "{{ names.users.raid.red_ro }}"
      password: "{{ secrets.users.raid.red_ro }}"
      dir_mode: "0750"
      file_mode: "0640"

  glusterfs:
    - host: "{{ names.hosts.docker01 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.dfs_lvm }}"
      src: /dev/mapper/ubuntu--vg-dfs_lvm
      path: /mnt/dfs_lvm

    - host: "{{ names.hosts.docker02 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.dfs_lvm }}"
      src: /dev/mapper/ubuntu--vg-dfs_lvm
      path: /mnt/dfs_lvm
