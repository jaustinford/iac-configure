---
xcalibr:
  group_name: roundtable
  group_id: 32600

cifs_globals: uid=0,gid={{ xcalibr.group_name }},dir_mode=0770,file_mode=0660

mounts:

    ###########################################################
    # xcalibr
    ###########################################################

  - host: docker02
    fstype: cifs
    owner: "{{ secrets.docker02.superuser.username }}"
    group: "{{ xcalibr.group_name }}"
    mode: "0770"
    src: //192.168.20.5/xcalibr-root
    opts: "username={{ secrets.nas.xcalibr_root_ro.username }},password={{ secrets.nas.xcalibr_root_ro.password }},{{ cifs_globals }}"
    path: /mnt/xcalibr-root
    state: "{{ cycle_mode.volumes.xcalibr }}"

  - host: docker01
    fstype: cifs
    owner: "{{ secrets.docker01.superuser.username }}"
    group: "{{ xcalibr.group_name }}"
    mode: "0770"
    src: //192.168.20.5/xcalibr-plex_libraries
    opts: "username={{ secrets.nas.xcalibr_plex_ro.username }},password={{ secrets.nas.xcalibr_plex_ro.password }},{{ cifs_globals }}"
    path: /mnt/xcalibr-plex_libraries
    state: "{{ cycle_mode.volumes.xcalibr }}"

  - host: docker02
    fstype: cifs
    owner: "{{ secrets.docker02.superuser.username }}"
    group: "{{ xcalibr.group_name }}"
    mode: "0770"
    src: //192.168.20.5/xcalibr-plex_libraries
    opts: "username={{ secrets.nas.xcalibr_plex_rw.username }},password={{ secrets.nas.xcalibr_plex_rw.password }},{{ cifs_globals }}"
    path: /mnt/xcalibr-plex_libraries
    state: "{{ cycle_mode.volumes.xcalibr }}"

  - host: docker01
    fstype: cifs
    owner: "{{ secrets.docker01.superuser.username }}"
    group: "{{ xcalibr.group_name }}"
    mode: "0770"
    src: //192.168.20.5/xcalibr-deluge
    opts: "username={{ secrets.nas.xcalibr_deluge_rw.username }},password={{ secrets.nas.xcalibr_deluge_rw.password }},{{ cifs_globals }}"
    path: /mnt/xcalibr-deluge
    state: "{{ cycle_mode.volumes.xcalibr }}"

  - host: docker02
    fstype: cifs
    owner: "{{ secrets.docker02.superuser.username }}"
    group: "{{ xcalibr.group_name }}"
    mode: "0770"
    src: //192.168.20.5/xcalibr-deluge
    opts: "username={{ secrets.nas.xcalibr_deluge_rw.username }},password={{ secrets.nas.xcalibr_deluge_rw.password }},{{ cifs_globals }}"
    path: /mnt/xcalibr-deluge
    state: "{{ cycle_mode.volumes.xcalibr }}"

  - host: docker02
    fstype: cifs
    owner: "{{ secrets.docker02.superuser.username }}"
    group: "{{ xcalibr.group_name }}"
    mode: "0770"
    src: //192.168.20.5/xcalibr-tfstate
    opts: "username={{ secrets.nas.xcalibr_tf_rw.username }},password={{ secrets.nas.xcalibr_tf_rw.password }},{{ cifs_globals }}"
    path: /mnt/xcalibr-tfstate
    state: "{{ cycle_mode.volumes.xcalibr }}"

    ###########################################################
    # glusterfs
    ###########################################################

  - host: docker01
    fstype: ext4
    src: /dev/mapper/ubuntu--vg-dfs_lvm
    owner: "{{ secrets.docker01.superuser.username }}"
    group: "{{ secrets.docker01.superuser.username }}"
    mode: "0755"
    opts: defaults
    path: /mnt/dfs_lvm
    state: "{{ cycle_mode.volumes.dfs_lvm }}"

  - host: docker02
    fstype: ext4
    src: /dev/mapper/ubuntu--vg-dfs_lvm
    owner: "{{ secrets.docker02.superuser.username }}"
    group: "{{ secrets.docker02.superuser.username }}"
    mode: "0755"
    opts: defaults
    path: /mnt/dfs_lvm
    state: "{{ cycle_mode.volumes.dfs_lvm }}"
