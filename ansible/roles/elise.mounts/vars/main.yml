---
mounts:
  samba:
    - host: "{{ names.hosts.docker01 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.raid_vol }}"
      src: "//{{ nas_vlan_20_address }}/{{ names.raid_vol.name }}-black"
      path: "/root/smb/mounts/{{ names.raid_vol.name }}-black"
      username: "{{ names.users.raid_vol.black_rw }}"
      password: "{{ secrets.users.nas.raid_vol.black_rw }}"

    - host: "{{ names.hosts.docker02 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.raid_vol }}"
      src: "//{{ nas_vlan_20_address }}/{{ names.raid_vol.name }}-black"
      path: "/root/smb/mounts/{{ names.raid_vol.name }}-black"
      username: "{{ names.users.raid_vol.black_rw }}"
      password: "{{ secrets.users.nas.raid_vol.black_rw }}"

    - host: "{{ names.hosts.docker02 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.raid_vol }}"
      src: "//{{ nas_vlan_20_address }}/{{ names.raid_vol.name }}-blue"
      path: "/root/smb/mounts/{{ names.raid_vol.name }}-blue"
      username: "{{ names.users.raid_vol.blue_ro }}"
      password: "{{ secrets.users.nas.raid_vol.blue_ro }}"

    - host: "{{ names.hosts.docker02 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.raid_vol }}"
      src: "//{{ nas_vlan_20_address }}/{{ names.raid_vol.name }}-green"
      path: "/root/smb/mounts/{{ names.raid_vol.name }}-green"
      username: "{{ names.users.raid_vol.green_rw }}"
      password: "{{ secrets.users.nas.raid_vol.green_rw }}"

    - host: "{{ names.hosts.docker01 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.raid_vol }}"
      src: "//{{ nas_vlan_20_address }}/{{ names.raid_vol.name }}-red"
      path: "/root/smb/mounts/{{ names.raid_vol.name }}-red"
      username: "{{ names.users.raid_vol.red_ro }}"
      password: "{{ secrets.users.nas.raid_vol.red_ro }}"

  glusterfs:
    - host: "{{ names.hosts.docker01 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.dfs_lvm }}"
      src: /dev/mapper/ubuntu--vg-dfs_lvm
      path: /mnt/dfs_lvm

    - host: "{{ names.hosts.docker02 }}.{{ lab.domain }}"
      state: "{{ cycle_mode.volumes.dfs_lvm }}"
      src: /dev/mapper/ubuntu--vg-dfs_lvm
      path: /mnt/dfs_lvm
