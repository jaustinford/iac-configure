---
- name: MOUNT - create xcalibr user group
  ansible.builtin.group:
    name: "{{ xcalibr.group_name }}"
    state: present
    gid: "{{ xcalibr.group_id }}"
  become: true

- name: "MOUNT - ensure mount path {{ item.path }}"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  become: true

- name: "MOUNT - mount volume {{ item.path }}"
  ansible.posix.mount:
    fstype: "{{ item.fstype }}"
    src: "{{ item.src }}"
    opts: "{{ item.opts }}"
    path: "{{ item.path }}"
    state: "{{ item.state }}"
  become: true
  no_log: true
