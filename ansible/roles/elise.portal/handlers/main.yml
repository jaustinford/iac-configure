---
- name: MAIN - systemctl restart nginx
  ansible.builtin.systemd:
    name: nginx
    state: restarted
  become: true

- name: MAIN - systemctl restart ssh
  ansible.builtin.systemd:
    name: ssh
    state: restarted
  become: true

- name: MAIN - reboot
  delegate_to: localhost
  community.general.linode:
    api_key: "{{ secrets.linode.token }}"
    name: portal
    state: restarted
