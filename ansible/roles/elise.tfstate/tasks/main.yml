---
- name: MAIN - fetch tfstate file
  ansible.builtin.fetch:
    src: /mnt/tvault/austin/elysianskies/tfstate/elysianskies.json
    dest: /tmp/elysianskies.json
    flat: true
  changed_when: false

- name: MAIN - fetch elysianskies tfstate
  delegate_to: localhost
  ansible.builtin.debug:
    msg: "{{ lookup('ansible.builtin.file', '/tmp/elysianskies.json') }}"
  no_log: true
  register: elysianskies_tfstate

- name: MAIN - record linode ip addresses
  delegate_to: localhost
  ansible.builtin.copy:
    content: "{{ elysianskies_tfstate.msg.outputs[item.instance_ip_address_output_element].value[0] }}"
    dest: /tmp/{{ item.instance_ip_address_output_element }}.txt
    mode: "0644"
  changed_when: false
  with_items:
    - "{{ linodes }}"
