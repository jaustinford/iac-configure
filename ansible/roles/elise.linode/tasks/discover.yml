---
- name: DISCOVER - find external nginx
  ansible.builtin.uri:
    url: "https://ping.proxy-ext.{{ lab.domain }}"
    status_code: "{{ lab.task_globals.discover_uri.status_code }}"
  register: external_check

- name: DISCOVER - find internal nginx
  ansible.builtin.uri:
    url: "https://ping.proxy-int.{{ lab.domain }}"
    status_code: "{{ lab.task_globals.discover_uri.status_code }}"
  register: internal_check
