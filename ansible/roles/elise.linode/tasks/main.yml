---
- name: LINODE - fetch elysianskies tfstate
  ansible.builtin.debug:
    msg: "{{ lookup('ansible.builtin.file', '/tmp/elysianskies.json') }}"
  no_log: true
  register: elysianskies_tfstate

- name: LINODE - manage linode
  linode_state:
    token: "{{ lookup('env', 'LINODE_TOKEN') }}"
    id: "{{ elysianskies_tfstate.msg.outputs[item.instance_id_output_element].value[0] }}"
    state: "{{ item.state }}"
  with_items:
    - "{{ linodes }}"
