---
- name: WAKE - include discover tasks
  ansible.builtin.include_tasks: discover.yml

- name: WAKE - manage linode
  linode_state:
    token: "{{ secrets.external.linode.token }}"
    id: "{{ lab_tfstate.msg.outputs[item.output_elements.instance_id].value[0] }}"
    state: "{{ 'restarted' if external_check.status == 200 and internal_check.status != 200 and cycle_mode.name == 'up' else item.state }}"
  when: internet_found == "yes"

- name: "WAKE - waiting on host port {{ item.wait_port }}"
  ansible.builtin.wait_for:
    host: "{{ lab_tfstate.msg.outputs[item.output_elements.ip_address].value[0] }}"
    port: "{{ item.wait_port }}"
    state: "{{ item.state }}"
  when: internet_found == "yes"
