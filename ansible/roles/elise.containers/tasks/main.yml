---
- name: MAIN - include container tasks in deploy mode
  ansible.builtin.include_tasks: container.yml
  no_log: true
  when: execute_mode.name == "up"
  with_items:
    - "{{ containers }}"

- name: MAIN - include container tasks in shutdown mode
  ansible.builtin.include_tasks: container.yml
  no_log: true
  when: execute_mode.name == "down"
  with_items:
    - "{{ containers | reverse }}"
