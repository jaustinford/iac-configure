---
- name: "CONTAINER - include container vars for {{ item.path }}"
  ansible.builtin.include_vars: "{{ item.src }}"
  no_log: true

- name: "CONTAINER - docker container {{ container.name }}"
  community.docker.docker_container:
    name: "{{ container.name }}"
    image: "{{ container.image }}"
    pull: "{{ container.pull }}"
    user: "{{ container.user }}"
    command: "{{ container.command }}"
    docker_host: "tcp://{{ container.docker_host }}:2375"
    restart_policy: "{{ containers_globals.restart_policy }}"
    detach: "{{ containers_globals.detach }}"
    labels: "{{ containers_globals.labels }}"
    state: "{{ cycle_mode.state.containers }}"
    shm_size: "{{ container.shm_size }}"
    devices: "{{ container.devices }}"
    capabilities: "{{ container.capabilities }}"
    network_mode: "{{ container.network_mode }}"
    dns_servers: "{{ container.dns_servers }}"
    dns_search_domains: "{{ container.dns_search_domains }}"
    env: "{{ container.env }}"
    ports: "{{ container.ports }}"
    volumes: "{{ container.volumes }}"
    privileged: false
  vars:
    ansible_python_interpreter: /usr/local/bin/python3
  no_log: true

- name: CONTAINER - include wait tasks
  ansible.builtin.include_tasks: wait.yml
  when: container.wait_port != "0"

- name: CONTAINER - include elastic tasks
  ansible.builtin.include_tasks: elastic.yml
  when: container.name == "elasticsearch" and cycle_mode.name == "up"
