    devices:
      - /dev/net/tun
    capabilities:
      - net_admin
    network_mode: "{{ containers_globals.network_mode }}"
    dns_servers: "{{ containers_globals.dns_servers }}"
    dns_search_domains: "{{ containers_globals.dns_search_domains }}"
    env: {}
    ports:
      - "{{ assignments.expressvpn.networking.teine.ipv4 }}:{{ external_ports.expressvpn_squid }}:3128/tcp"
      - "{{ assignments.expressvpn.networking.teine.ipv4 }}:{{ external_ports.expressvpn_deluge }}:8112/tcp"
    volumes:
      - "{{ containers_globals.configuration_directory }}/expressvpn/vpn:/vpn:ro"
    wait_for_port: "0"

  - name: squid
    image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/sameersbn/squid:3.5.27-2"
