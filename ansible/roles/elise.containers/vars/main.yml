---
containers_globals:
  restart_policy: unless-stopped
  pull: false
  detach: true
  labels:
    elysianskies_container: "true"
  shm_size: 64M
  network_mode: bridge
  dns_servers:
    - "{{ assignments.pihole.networking.talamh.ipv4 }}"
    - 172.16.14.4
    - 8.8.8.8
  dns_search_domains:
    - home.elysianskies.com
  application_directory: /elysianskies/application_data
  configuration_directory: /elysianskies/configurations

containers:
  - name: nexus
    image: sonatype/nexus3:3.68.1
    pull: "{{ containers_globals.pull }}"
    command:
      - /opt/sonatype/nexus/bin/nexus
      - run
    docker_host: "{{ assignments.nexus.networking.teine.ipv4 }}"
    restart_policy: "{{ containers_globals.restart_policy }}"
    detach: "{{ containers_globals.detach }}"
    labels: "{{ containers_globals.labels }}"
    state: "{{ assignments.nexus.state.containers }}"
    shm_size: "{{ containers_globals.shm_size }}"
    devices: []
    capabilities: []
    network_mode: "{{ containers_globals.network_mode }}"
    dns_servers: "{{ containers_globals.dns_servers }}"
    dns_search_domains: "{{ containers_globals.dns_search_domains }}"
    env: {}
    ports:
      - "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_web }}:8081/tcp"
      - "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_hosted }}:{{ external_ports.nexus_docker_hosted }}/tcp"
      - "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}:{{ external_ports.nexus_docker_proxy }}/tcp"
    volumes:
      - "{{ containers_globals.application_directory }}/nexus/data:/nexus-data:rw"
    wait_for_port: "{{ external_ports.nexus_docker_proxy }}"

  - name: pihole
    image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/pihole/pihole:2024.03.2"
    pull: "{{ containers_globals.pull }}"
    command: null
    docker_host: "{{ assignments.pihole.networking.teine.ipv4 }}"
    restart_policy: "{{ containers_globals.restart_policy }}"
    detach: "{{ containers_globals.detach }}"
    labels: "{{ containers_globals.labels }}"
    state: "{{ assignments.pihole.state.containers }}"
    shm_size: "{{ containers_globals.shm_size }}"
    devices: []
    capabilities:
      - net_admin
    network_mode: "{{ containers_globals.network_mode }}"
    dns_servers: "{{ containers_globals.dns_servers }}"
    dns_search_domains: "{{ containers_globals.dns_search_domains }}"
    env:
      WEBPASSWORD: "{{ secrets.pihole.webpassword }}"
      ServerIP: "{{ assignments.pihole.networking.teine.ipv4 }}"
      ADMIN_EMAIL: j.austin.ford@gmail.com
      TEMPERATUREUNIT: F
      WEBTHEME: default-dark
      PIHOLE_DNS_1: "{{ containers_globals.dns_servers[2] }}"
    ports:
      - "{{ assignments.pihole.networking.talamh.ipv4 }}:53:53/udp"
      - "{{ assignments.pihole.networking.uisge.ipv4 }}:53:53/udp"
      - "{{ assignments.pihole.networking.teine.ipv4 }}:53:53/udp"
      - "{{ assignments.pihole.networking.teine.ipv4 }}:{{ external_ports.pihole_web }}:80/tcp"
    volumes:
      - "{{ containers_globals.application_directory }}/pihole/data:/etc/pihole:rw"
      - "{{ containers_globals.application_directory }}/pihole/dnsmasq.d:/etc/dnsmasq.d:rw"
    wait_for_port: "{{ external_ports.pihole_web }}"

  - name: plex
    image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/plexinc/pms-docker:1.40.2.8395-c67dce28e"
    pull: "{{ containers_globals.pull }}"
    command: null
    docker_host: "{{ assignments.plex.networking.teine.ipv4 }}"
    restart_policy: "{{ containers_globals.restart_policy }}"
    detach: "{{ containers_globals.detach }}"
    labels: "{{ containers_globals.labels }}"
    state: "{{ assignments.plex.state.containers }}"
    shm_size: "{{ containers_globals.shm_size }}"
    devices: []
    capabilities: []
    network_mode: "{{ containers_globals.network_mode }}"
    dns_servers: "{{ containers_globals.dns_servers }}"
    dns_search_domains: "{{ containers_globals.dns_search_domains }}"
    env:
      PLEX_CLAIM: "{{ secrets.plex.plex_claim }}"
      ADVERTISE_IP: https://plex.home.elysianskies.com:443
      ALLOWED_NETWORKS: 172.16.14.0/27,172.16.17.0/29
    ports:
      - "{{ assignments.plex.networking.talamh.ipv4 }}:{{ external_ports.plex_web }}:32400/tcp"
      - "{{ assignments.plex.networking.teine.ipv4 }}:{{ external_ports.plex_web }}:32400/tcp"
    volumes:
      - "{{ containers_globals.application_directory }}/plex/Application Support:/config/Library/Application Support:rw"
      - /tmp/transcode:/transcode:rw
      - /mnt/tvault/video/plex_libraries:/plex_libraries:ro
    wait_for_port: "{{ external_ports.plex_web }}"

  - name: tautulli
    image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/linuxserver/tautulli:amd64-v2.13.4-ls121"
    pull: "{{ containers_globals.pull }}"
    command: null
    docker_host: "{{ assignments.tautulli.networking.teine.ipv4 }}"
    restart_policy: "{{ containers_globals.restart_policy }}"
    detach: "{{ containers_globals.detach }}"
    labels: "{{ containers_globals.labels }}"
    state: "{{ assignments.tautulli.state.containers }}"
    shm_size: "{{ containers_globals.shm_size }}"
    devices: []
    capabilities: []
    network_mode: "{{ containers_globals.network_mode }}"
    dns_servers: "{{ containers_globals.dns_servers }}"
    dns_search_domains: "{{ containers_globals.dns_search_domains }}"
    env: {}
    ports:
      - "{{ assignments.tautulli.networking.teine.ipv4 }}:{{ external_ports.tautulli_web }}:8181/tcp"
    volumes:
      - "{{ containers_globals.application_directory }}/tautulli/config:/config:rw"
    wait_for_port: "{{ external_ports.tautulli_web }}"

  - name: filebrowser
    image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/filebrowser/filebrowser:v2.28.0-amd64-s6"
    pull: "{{ containers_globals.pull }}"
    command: null
    docker_host: "{{ assignments.filebrowser.networking.teine.ipv4 }}"
