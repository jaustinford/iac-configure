    wait_for_port: "{{ external_ports.expressvpn_squid }}"

  - name: deluge
    image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/linuxserver/deluge:version-2.0.3-2201906121747ubuntu18.04.1"
