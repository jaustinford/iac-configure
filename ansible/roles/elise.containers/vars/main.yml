    ports:
      - "{{ assignments.gitlab.networking.teine.ipv4 }}:{{ external_ports.gitlab_web }}:80/tcp"
    volumes:
      - "{{ containers_globals.application_directory }}/gitlab/config:/etc/gitlab:rw"
