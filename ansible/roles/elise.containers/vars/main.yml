    env:
      PUID: "1000"
    ports:
      - "{{ assignments.filebrowser.networking.teine.ipv4 }}:{{ external_ports.filebrowser_web }}:80/tcp"
    volumes:
      - "{{ containers_globals.configuration_directory }}/filebrowser/settings.json:/config/settings.json:ro"
      - "{{ containers_globals.application_directory }}/filebrowser/filebrowser.db:/database/filebrowser.db:rw"
      - /mnt/tvault:/tvault:rw
    wait_for_port: "{{ external_ports.filebrowser_web }}"

  - name: elasticsearch
    image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/elastic/elasticsearch:8.13.0"
    pull: "{{ containers_globals.pull }}"
    command:
      - eswrapper
    docker_host: "{{ assignments.elasticsearch.networking.teine.ipv4 }}"
    restart_policy: "{{ containers_globals.restart_policy }}"
    detach: "{{ containers_globals.detach }}"
    labels: "{{ containers_globals.labels }}"
    state: "{{ assignments.elasticsearch.state.containers }}"
    shm_size: "{{ containers_globals.shm_size }}"
    devices: []
    capabilities: []
    network_mode: "{{ containers_globals.network_mode }}"
    dns_servers: "{{ containers_globals.dns_servers }}"
    dns_search_domains: "{{ containers_globals.dns_search_domains }}"
    env:
      ES_JAVA_OPTS: -Xms4g -Xmx4g
    ports:
      - "{{ assignments.elasticsearch.networking.teine.ipv4 }}:{{ external_ports.elasticsearch_db }}:9200/tcp"
    volumes:
      - "{{ containers_globals.configuration_directory }}/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro"
      - "{{ containers_globals.application_directory }}/elasticsearch/data:/usr/share/elasticsearch/data:rw"
    wait_for_port: "{{ external_ports.elasticsearch_db }}"

  - name: kibana
    image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/elastic/kibana:8.13.0"
    pull: "{{ containers_globals.pull }}"
    command:
