    detach: "{{ containers_globals.detach }}"
    labels: "{{ containers_globals.labels }}"
    state: "{{ assignments.zoneminder.state.containers }}"
    shm_size: 4G
    devices:
      - /dev/video0
      - /dev/video2
    capabilities: []
    network_mode: "{{ containers_globals.network_mode }}"
    dns_servers: "{{ containers_globals.dns_servers }}"
    dns_search_domains: "{{ containers_globals.dns_search_domains }}"
    env: {}
    ports:
      - "{{ assignments.zoneminder.networking.teine.ipv4 }}:{{ external_ports.zoneminder_web }}:80/tcp"
    volumes:
      - "{{ containers_globals.application_directory }}/zoneminder/config:/config:rw"
      - "{{ containers_globals.application_directory }}/zoneminder/recordings:/zm_recordings:rw"
      - "{{ containers_globals.configuration_directory }}/zoneminder/ssmtp.conf:/etc/ssmtp/ssmtp.conf:ro"
