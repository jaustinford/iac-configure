---
###########################################################
# docs
###########################################################

###########################################################
# Hosts the lab's documentation service, provided by Mkdocs
# and automated with Elysian Skies CI/CD.
###########################################################

container:
  name: docs
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_hosted }}/elise/docs:main"
  pull: "{{ containers_globals.pull_images.local }}"
  command:
    - mkdocs
    - serve
  docker_host: "{{ assignments.docs.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ containers_globals.env.TZ }}"
  ports:
    - "{{ assignments.docs.networking.teine.ipv4 }}:{{ external_ports.docs_web }}:8000/tcp"
  volumes: []
  wait_port: "{{ external_ports.docs_web }}"
