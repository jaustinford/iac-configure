---
###########################################################
# kibana
###########################################################

###########################################################
# Free and open-source data visualization and exploration
# tool, primarily used to work with data stored in
# Elasticsearch. It allows users to analyze, visualize, and
# interact with data through dashboards, charts, and other
# visualizations, making it a key component of the Elastic
# Stack.
###########################################################

container:
  name: kibana
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/elastic/kibana:8.13.0"
  pull: "{{ containers_globals.pull_images.remote }}"
  command:
    - /usr/local/bin/kibana-docker
  docker_host: "{{ assignments.kibana.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ containers_globals.env.TZ }}"
  ports:
    - "{{ assignments.kibana.networking.teine.ipv4 }}:{{ external_ports.kibana_web }}:5601/tcp"
  volumes:
    - "{{ lab_dirs.configuration_directory }}/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro"
  wait_port: "{{ external_ports.kibana_web }}"
