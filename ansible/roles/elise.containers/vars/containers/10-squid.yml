---
###########################################################
# squid
###########################################################

###########################################################
# Caching and forwarding web proxy server. It acts as an
# intermediary between clients and servers, offering
# features like caching frequently accessed content,
# controlling access to websites, and optimizing traffic
# flow. Squid is often used to improve network performance,
# enhance security, and manage internet access.
###########################################################

container:
  name: squid
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/sameersbn/squid:3.5.27-2"
  pull: "{{ containers_globals.pull_images.remote }}"
  command: null
  docker_host: "{{ assignments.squid.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: container:expressvpn
  dns_servers: []
  dns_search_domains: []
  env:
    TZ: "{{ containers_globals.env.TZ }}"
  ports: []
  volumes:
    - "{{ lab_dirs.configuration_directory }}/squid/squid.conf:/etc/squid/squid.conf:ro"
  wait_port: "{{ external_ports.expressvpn_squid }}"
