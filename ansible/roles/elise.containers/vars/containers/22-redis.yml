---
###########################################################
# redis
###########################################################

###########################################################
# Fast, in-memory, open-source data store that can be used
# as a database, cache, and message broker. It is known for
# its speed and flexibility, making it suitable for various
# applications like caching, real-time analytics, and
# session management.
###########################################################

container:
  name: redis
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/bitnami/redis:7.2.4-debian-11-r19"
  pull: "{{ containers_globals.pull_images.remote }}"
  command:
    - /opt/bitnami/scripts/redis/run.sh
  docker_host: "{{ assignments.redis.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ containers_globals.env.TZ }}"
    REDIS_PASSWORD: "{{ secrets.redis.password }}"
  ports:
    - "{{ assignments.redis.networking.teine.ipv4 }}:{{ external_ports.redis_db }}:6379/tcp"
  volumes:
    - "{{ lab_dirs.application_directory }}/keycloak/data:/opt/jboss/keycloak/standalone/data:rw"
  wait_port: "{{ external_ports.redis_db }}"
