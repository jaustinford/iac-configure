---
###########################################################
# lazarus
###########################################################

###########################################################
# Power event management system which executes
# elise/infrastructure/iac-configure in cycle modes.
###########################################################

container:
  name: lazarus
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_hosted }}/elise/lazarus:main"
  pull: "{{ containers_globals.pull_images.local }}"
  command:
    - python3
    - src
  docker_host: "{{ assignments.lazarus.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: started
  shm_size: "{{ containers_globals.shm_size }}"
  devices:
    - /dev/usb/hiddev0
    - /dev/usb/hiddev1
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ containers_globals.env.TZ }}"
    USER_HOME: "{{ hostvars[assignments.lazarus.networking.teine.fqdn].ansible_user_dir }}"
    IAC_CONFIGURE_PROJECT_DIR: "{{ hostvars[assignments.lazarus.networking.teine.fqdn].ansible_user_dir }}/iac-configure"
    SKIP_PAUSE: 'yes'
    COMPOSE_PROFILE: site
    ELASTICSEARCH_ENDPOINT: "{{ assignments.elasticsearch.networking.teine.ipv4 }}:{{ external_ports.elasticsearch_db }}"
    ELASTICSEARCH_USERNAME: "{{ secrets.elasticsearch.user.username }}"
    ELASTICSEARCH_PASSWORD: "{{ secrets.elasticsearch.user.password }}"
  ports: []
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock:rw
    - "{{ hostvars[assignments.lazarus.networking.teine.fqdn].ansible_user_dir }}/.docker:/root/.docker:rw"
    - "{{ hostvars[assignments.lazarus.networking.teine.fqdn].ansible_user_dir }}/iac-configure:/iac-configure:ro"
    - "{{ hostvars[assignments.lazarus.networking.teine.fqdn].ansible_user_dir }}/data:/lazarus/data:rw"
  wait_port: "0"
