---
###########################################################
# fourohfour
###########################################################

###########################################################
# Nginx static page for handling 404 errors.
###########################################################

container:
  name: fourohfour
  image: "{{ nexus_vlan_40_address }}:{{ ports.nexus_docker_hosted }}/elise/static-website-fourohfour:main"
  pull: "{{ containers_globals.pull_images.local }}"
  user: "{{ assignments.fourohfour.uid }}:{{ assignments.fourohfour.uid }}"
  command:
    - httpd-foreground
  docker_host: "{{ fourohfour_vlan_40_address }}"
  state: "{{ cycle_mode.state.containers }}"
  restart_policy: unless-stopped
  detach: true
  interactive: false
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ names.local_timezone }}"
  ports:
    - "{{ fourohfour_vlan_40_address }}:{{ ports.fourohfour_web }}:80/tcp"
  volumes: []
  wait_port: "{{ ports.fourohfour_web }}"
