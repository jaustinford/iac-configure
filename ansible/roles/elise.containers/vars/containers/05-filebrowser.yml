---
###########################################################
# filebrowser
###########################################################

###########################################################
# Self-hosted, open-source web application for managing
# files and folders. It allows users to perform basic file
# operations like creating, deleting, renaming, uploading,
# downloading, and zipping files and folders, either
# locally or connected to other storage services.
###########################################################

container:
  name: filebrowser
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/filebrowser/filebrowser:v2.31.1-amd64"
  pull: "{{ containers_globals.pull_images.remote }}"
  command: null
  docker_host: "{{ assignments.filebrowser.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ containers_globals.env.TZ }}"
    PUID: "1000"
  ports:
    - "{{ assignments.filebrowser.networking.teine.ipv4 }}:{{ external_ports.filebrowser_web }}:80/tcp"
  volumes:
    - "{{ lab_dirs.configuration_directory }}/filebrowser/settings.json:/.filebrowser.json:ro"
    - "{{ lab_dirs.application_directory }}/filebrowser/filebrowser.db:/database.db:rw"
    - /mnt/tvault:/tvault:rw
  wait_port: "{{ external_ports.filebrowser_web }}"
