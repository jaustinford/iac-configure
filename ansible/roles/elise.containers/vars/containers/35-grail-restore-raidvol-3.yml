---
###########################################################
# grail-restore-raidvol-3
###########################################################

###########################################################
# Standby container for running Grail secure restore
# operations.
###########################################################

container:
  name: grail-restore-raidvol-3
  image: "{{ nexus_vlan_40_address }}:{{ ports.nexus_docker_hosted }}/elise/grail:main"
  user: "0:{{ assignments.grail_restore_raidvol_3.uid }}"
  command:
    - python3
    - src
  docker_host: "{{ grail_restore_raidvol_3_vlan_40_address }}"
  state: present
  restart_policy: "no"
  privileged: true
  detach: false
  interactive: true
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ names.local_timezone }}"
    BACKUP_OBJECT: raidvol-3
    BACKUP_DISK_NAME: BACKUP_3
    BACKUP_DISK_MOUNTPOINT: /grail-src
  ports: []
  volumes:
    - /root/approle/grail.json:/approle/grail.json:ro
    - /mnt/grail:/grail-src:rw
  wait_port: "0"
