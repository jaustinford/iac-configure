---
###########################################################
# keycloak
###########################################################

###########################################################
# Open-source Identity and Access Management (IAM) solution
# designed to help manage user authentication and
# authorization for applications and services. It acts as a
# central hub for handling user logins, allowing for Single
# Sign-On (SSO) across multiple applications.
###########################################################

container:
  name: keycloak
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/keycloak/keycloak:26.0.0-0"
  pull: "{{ containers_globals.pull_images.remote }}"
  command:
    - start
  docker_host: "{{ assignments.keycloak.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ containers_globals.env.TZ }}"
    KC_HOSTNAME: keycloak.home.elysianskies.com
    KC_PROXY: edge
    KC_HTTP_ENABLED: "true"
    KC_PROXY_HEADERS: xforwarded
    KEYCLOAK_ADMIN: "{{ secrets.keycloak.username }}"
    KEYCLOAK_ADMIN_PASSWORD: "{{ secrets.keycloak.password }}"
  ports:
    - "{{ assignments.keycloak.networking.teine.ipv4 }}:{{ external_ports.keycloak_web }}:8080/tcp"
  volumes:
    - "{{ lab_dirs.application_directory }}/keycloak/data:/opt/keycloak/data:rw"
  wait_port: "{{ external_ports.keycloak_web }}"
