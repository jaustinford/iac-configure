---
###########################################################
# grail-restore-appvol
###########################################################

###########################################################
# Standby container for running Grail secure restore
# operations.
###########################################################

container:
  name: grail-restore-appvol
  image: "{{ nexus_vlan_40_address }}:{{ ports.nexus_docker_hosted }}/elise/grail:main"
  user: "0:{{ assignments.grail_restore_appvol.uid }}"
  command:
    - python3
    - src
  docker_host: "{{ grail_restore_appvol_vlan_40_address }}"
  state: present
  restart_policy: "no"
  privileged: true
  detach: false
  interactive: true
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ names.local_timezone }}"
    BACKUP_OBJECT: appvol
    BACKUP_DISK_NAME: BACKUP_1
    BACKUP_DISK_MOUNTPOINT: /grail-src
  ports: []
  volumes:
    - "{{ folder_secrets_approle }}/grail.json:/approle/grail.json:ro"
    - "{{ folder_raid_grail }}/grail:/grail-disk:rw"
    - /mnt/dfs_lvm/lab_dfs:/grail-dst:rw
  wait_port: "0"
