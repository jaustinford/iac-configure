---
###########################################################
# gitlab
###########################################################

###########################################################
# Web-based DevSecOps platform that provides a
# comprehensive set of tools for the entire software
# development lifecycle. It's built around Git, a
# distributed version control system, and offers features
# for source code management, continuous
# integration/continuous deployment (CI/CD), issue
# tracking, and more.
###########################################################

container:
  name: gitlab
  image: "{{ nexus_vlan_40_address }}:{{ ports.nexus_docker_proxy }}/gitlab/gitlab-ee:18.10.1-ee.0"
  user: "0:0"
  command:
    - /assets/init-container
  docker_host: "{{ gitlab_vlan_40_address }}"
  state: "{{ cycle_mode.state.containers }}"
  restart_policy: unless-stopped
  privileged: false
  detach: true
  interactive: false
  shm_size: 4G
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ names.local_timezone }}"
    GITLAB_ROOT_PASSWORD: "{{ secrets.containers.gitlab.superuser }}"
    GITLAB_OMNIBUS_CONFIG: |
      external_url "http://cicd.{{ lab.domain }}"
      gitlab_rails['smtp_enable'] = true
      gitlab_rails['smtp_address'] = "smtp.gmail.com"
      gitlab_rails['smtp_port'] = 587
      gitlab_rails['smtp_user_name'] = "{{ names.svc_email }}"
      gitlab_rails['smtp_password'] = "{{ secrets.containers.gitlab.gmail_app_password }}"
      gitlab_rails['smtp_domain'] = "smtp.gmail.com"
      gitlab_rails['smtp_authentication'] = "login"
      gitlab_rails['smtp_enable_starttls_auto'] = true
      gitlab_rails['smtp_openssl_verify_mode'] = "peer"
      gitlab_rails['gitlab_email_from'] = "{{ names.svc_email }}"
      gitlab_rails['gitlab_email_reply_to'] = "{{ names.svc_email }}"
      gitlab_rails['gitlab_shell_ssh_port'] = {{ ports.gitlab_ssh }}
  ports:
    - "{{ gitlab_vlan_40_address }}:{{ ports.gitlab_web }}:80/tcp"
    - "{{ gitlab_vlan_40_address }}:{{ ports.gitlab_ssh }}:22/tcp"
  volumes:
    - "{{ folder_container_app }}/gitlab/config:/etc/gitlab:rw"
    - "{{ folder_container_app }}/gitlab/logs:/var/log/gitlab:rw"
    - "{{ folder_container_app }}/gitlab/data:/var/opt/gitlab:rw"
  wait_port: "{{ ports.gitlab_web }}"
