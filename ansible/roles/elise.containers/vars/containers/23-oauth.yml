---
###########################################################
# oauth
###########################################################

###########################################################
# Reverse proxy that provides authentication for
# applications using OAuth2 or OpenID Connect (OIDC)
# providers like Google, GitHub, and others. It acts as a
# middleman, intercepting requests to your application and
# redirecting users to their chosen provider for
# authentication.
###########################################################

container:
  name: oauth
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/bitnami/oauth2-proxy:7.4.0"
  pull: "{{ containers_globals.pull_images.remote }}"
  command:
    - --config=/etc/oauth2-proxy.cfg
    - --upstream=http://0.0.0.0:8080/
    - --http-address=0.0.0.0:4180
  docker_host: "{{ assignments.oauth.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ containers_globals.env.TZ }}"
  ports:
    - "{{ assignments.oauth.networking.teine.ipv4 }}:{{ external_ports.oauth_web }}:4180/tcp"
  volumes:
    - "{{ lab_dirs.configuration_directory }}/oauth/oauth2-proxy.cfg:/etc/oauth2-proxy.cfg:ro"
  wait_port: "0"
