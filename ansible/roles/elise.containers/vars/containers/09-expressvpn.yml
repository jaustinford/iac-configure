---
###########################################################
# expressvpn
###########################################################

###########################################################
# Virtual private network (VPN) service that enhances
# online privacy and security by encrypting internet
# traffic and masking your IP address and location. It
# creates a secure, encrypted tunnel between your device
# and the internet, making it difficult for third parties
# to track your online activity or access your data.
###########################################################

container:
  name: expressvpn
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/dperson/openvpn-client:amd64"
  pull: "{{ containers_globals.pull_images.remote }}"
  command:
    - -d
    - -f ""
  docker_host: "{{ assignments.expressvpn.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: "{{ containers_globals.shm_size }}"
  devices:
    - /dev/net/tun
  capabilities:
    - net_admin
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ containers_globals.env.TZ }}"
  ports:
    - "{{ assignments.expressvpn.networking.teine.ipv4 }}:{{ external_ports.expressvpn_squid }}:3128/tcp"
    - "{{ assignments.expressvpn.networking.talamh.ipv4 }}:{{ external_ports.expressvpn_squid }}:3128/tcp"
    - "{{ assignments.expressvpn.networking.teine.ipv4 }}:{{ external_ports.expressvpn_deluge }}:8112/tcp"
  volumes:
    - "{{ lab_dirs.configuration_directory }}/expressvpn/vpn:/vpn:ro"
  wait_port: "0"
