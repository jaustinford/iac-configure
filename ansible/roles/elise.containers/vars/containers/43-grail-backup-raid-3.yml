---
###########################################################
# grail-backup-raid-3
###########################################################

###########################################################
# Standby container for running Grail secure backup
# operations.
###########################################################

container:
  name: grail-backup-raid-3
  image: "{{ nexus_vlan_40_address }}:{{ ports.nexus_docker_hosted }}/elise/grail:main"
  user: "0:{{ assignments.grail_backup_raid_3.uid }}"
  command:
    - python3
    - src
  docker_host: "{{ grail_backup_raid_3_vlan_40_address }}"
  state: present
  restart_policy: "no"
  privileged: true
  detach: false
  interactive: true
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ names.local_timezone }}"
    BACKUP_OBJECT: raid-3
    BACKUP_DISK_MOUNTPOINT: /grail-dst
    VAULT_ENDPOINT: "http://{{ vault_vlan_40_address }}:{{ ports.vault_web }}"
    SMB_SHARE_HOST: 192.168.20.5
    SMB_SHARE_NAME: "{{ names.raid }}-root"
    SMB_SHARE_UID: "32628"
    SMB_SHARE_GID: "32628"
    SMB_APPROLE: grail
    SMB_VAULT_PATH: root_rw
  ports: []
  volumes:
    - "{{ folder_secrets_approle }}/grail.json:/approle/grail.json:ro"
    - "{{ folder_raid_grail }}:/grail-disk:rw"
  wait_port: "0"
