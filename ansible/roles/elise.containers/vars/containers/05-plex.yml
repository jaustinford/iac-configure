---
###########################################################
# plex
###########################################################

###########################################################
# Media server software and a free streaming service that
# allows users to organize, stream, and share their
# personal media collections across various devices. It
# also offers a free, ad-supported streaming service with
# live TV and on-demand content from partners like
# Lionsgate and MGM.
###########################################################

container:
  name: plex
  image: "{{ nexus_vlan_40_address }}:{{ ports.nexus_docker_proxy }}/plexinc/pms-docker:1.43.1.10611-1e34174b1"
  user: "0:{{ names.groups.tenants.id }}"
  command: null
  docker_host: "{{ plex_vlan_40_address }}"
  state: "{{ cycle_mode.state.containers }}"
  restart_policy: unless-stopped
  privileged: false
  detach: true
  interactive: false
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ names.local_timezone }}"
    PLEX_UID: "{{ assignments.plex.uid }}"
    PLEX_GID: "{{ names.groups.tenants.id }}"
    PLEX_CLAIM: "{{ secrets.containers.plex.plex_claim }}"
    ADVERTISE_IP: |
      http://192.168.60.6:{{ ports.plex_web }},
      http://{{ plex_vlan_40_address }}:{{ ports.plex_web }},
      https://media.{{ lab.domain }}
    ALLOWED_NETWORKS: |
      192.168.30.0/29,
      192.168.40.0/29,
      192.168.60.0/27
  ports:
    - "{{ plex_vlan_30_address }}:{{ ports.plex_web }}:32400/tcp"
    - "{{ plex_vlan_40_address }}:{{ ports.plex_web }}:32400/tcp"
  volumes:
    - "{{ folder_container_app }}/plex/Application Support:/config/Library/Application Support:rw"
    - "{{ folder_raid }}/{{ names.raid }}-red_ro:/plex_libraries:ro"
    - /tmp/transcode:/transcode:rw
  wait_port: "{{ ports.plex_web }}"
