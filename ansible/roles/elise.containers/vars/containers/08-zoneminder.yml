---
###########################################################
# zoneminder
###########################################################

###########################################################
# Free, open-source, full-featured video surveillance and
# security software application designed to run on
# Linux-based systems. It allows users to monitor, record,
# and manage video from various camera sources, including
# IP cameras, webcams, and analog cameras.
###########################################################

container:
  name: zoneminder
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/dlandon/zoneminder:latest"
  pull: "{{ containers_globals.pull_images.remote }}"
  command:
    - /sbin/my_init
  docker_host: "{{ assignments.zoneminder.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: 4G
  devices:
    - /dev/video0
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ containers_globals.env.TZ }}"
  ports:
    - "{{ assignments.zoneminder.networking.teine.ipv4 }}:{{ external_ports.zoneminder_web }}:80/tcp"
  volumes:
    - "{{ lab_dirs.application_directory }}/zoneminder/config:/config:rw"
    - "{{ lab_dirs.application_directory }}/zoneminder/recordings:/zm_recordings:rw"
    - "{{ lab_dirs.configuration_directory }}/zoneminder/ssmtp.conf:/etc/ssmtp/ssmtp.conf:ro"
    - "{{ lab_dirs.configuration_directory }}/zoneminder/revaliases:/etc/ssmtp/revaliases:ro"
  wait_port: "{{ external_ports.zoneminder_web }}"
