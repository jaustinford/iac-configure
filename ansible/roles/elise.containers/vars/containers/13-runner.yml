---
###########################################################
# runner
###########################################################

###########################################################
# Open-source application that executes jobs defined in
# GitLab CI/CD pipelines. It acts as an agent that picks up
# CI/CD jobs from a GitLab instance and runs them on a
# designated environment.
###########################################################

container:
  name: runner
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/gitlab/gitlab-runner:v17.5.4"
  pull: "{{ containers_globals.pull_images.remote }}"
  command:
    - run
    - --user=gitlab-runner
    - --working-directory=/home/gitlab-runner
  docker_host: "{{ assignments.runner.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ containers_globals.env.TZ }}"
  ports: []
  volumes:
    - "{{ lab_dirs.application_directory }}/runner/config:/etc/gitlab-runner:rw"
    - "{{ lab_dirs.application_directory }}/runner/cache:/cache:rw"
    - /var/run/docker.sock:/var/run/docker.sock:rw
    - /root/.docker:/root/.docker:rw
  wait_port: "0"
