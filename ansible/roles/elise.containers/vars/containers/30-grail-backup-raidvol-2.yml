---
###########################################################
# grail-backup-raidvol-2
###########################################################

###########################################################
# Standby container for running Grail secure backup
# operations.
###########################################################

container:
  name: grail-backup-raidvol-2
  image: "{{ nexus_vlan_40_address }}:{{ ports.nexus_docker_hosted }}/elise/grail:main"
  user: "0:{{ assignments.grail_backup_raidvol_2.uid }}"
  command:
    - python3
    - src
  docker_host: "{{ grail_backup_raidvol_2_vlan_40_address }}"
  state: present
  restart_policy: "no"
  privileged: true
  detach: false
  interactive: true
  shm_size: "{{ containers_globals.shm_size }}"
  devices:
    - /dev/sdb
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ names.local_timezone }}"
    BACKUP_OBJECT: raidvol-2
    BACKUP_DISK_NAME: BACKUP_2
    BACKUP_DISK_DEVICE: /dev/sdb1
    BACKUP_DISK_MOUNTPOINT: /grail-dst
  ports: []
  volumes:
    - /root/approle/grail.json:/approle/grail.json:ro
    - "/root/smb/mounts/{{ names.raid_vol.name }}-root:/grail-src:rw"
  wait_port: "0"
