---
###########################################################
# deluge
###########################################################

###########################################################
# Free and open-source, cross-platform BitTorrent client
# that utilizes the client-server model. It features a
# daemon process that handles all BitTorrent activity in
# the background, while users can interact with it through
# various interfaces like GTK+, web, or console.
###########################################################

container:
  name: deluge
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/linuxserver/deluge:2.1.1"
  pull: "{{ containers_globals.pull_images.remote }}"
  command: null
  docker_host: "{{ assignments.deluge.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: container:expressvpn
  dns_servers: []
  dns_search_domains: []
  env:
    TZ: "{{ containers_globals.env.TZ }}"
    PUID: "{{ containers_globals.env.PUID }}"
    PGID: "{{ containers_globals.env.PGID }}"
  ports: []
  volumes:
    - /mnt/xcalibr-deluge:/downloads:rw
    - "{{ lab_dirs.configuration_directory }}/deluge/auth:/config/auth:ro"
    - "{{ lab_dirs.configuration_directory }}/deluge/core.conf:/config/core.conf:ro"
    - "{{ lab_dirs.configuration_directory }}/deluge/hostlist.conf:/config/hostlist.conf:ro"
    - "{{ lab_dirs.configuration_directory }}/deluge/web.conf:/config/web.conf:ro"
    - "{{ lab_dirs.application_directory }}/deluge/plugins:/config/plugins:rw"
  wait_port: "{{ external_ports.expressvpn_deluge }}"
