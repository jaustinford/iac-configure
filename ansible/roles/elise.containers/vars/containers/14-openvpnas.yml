---
###########################################################
# openvpnas
###########################################################

###########################################################
# Commercial, self-hosted VPN solution designed for secure
# remote access to private networks, offering features like
# secure tunnels, multi-factor authentication, and flexible
# deployment options. It provides a secure way for
# businesses to connect employees to their internal
# resources from anywhere, ensuring data privacy and
# network security.
###########################################################

container:
  name: openvpnas
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/openvpn/openvpn-as:2.14.0-b90cb316-Ubuntu22"
  pull: "{{ containers_globals.pull_images.remote }}"
  command:
    - /usr/local/openvpn_as/scripts/openvpnas
    - --nodaemon
  docker_host: "{{ assignments.openvpnas.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities:
    - net_admin
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ containers_globals.env.TZ }}"
  ports:
    - "{{ assignments.openvpnas.networking.teine.ipv4 }}:{{ external_ports.openvpnas_web }}:943/tcp"
    - "{{ assignments.openvpnas.networking.teine.ipv4 }}:{{ external_ports.openvpnas_vpn }}:1194/tcp"
  volumes:
    - "{{ lab_dirs.application_directory }}/openvpnas/openvpn:/openvpn:rw"
  wait_port: "{{ external_ports.openvpnas_vpn }}"
