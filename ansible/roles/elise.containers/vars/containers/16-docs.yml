---
###########################################################
# docs
###########################################################

###########################################################
# Hosts the lab's documentation service, provided by Mkdocs
# and automated with PendragonLab CI/CD.
###########################################################

container:
  name: docs
  image: "{{ nexus_vlan_40_address }}:{{ ports.nexus_docker_hosted }}/elise/docs:main"
  pull: "{{ containers_globals.pull_images.local }}"
  user: "{{ assignments.docs.uid }}:{{ assignments.docs.uid }}"
  command:
    - mkdocs
    - serve
  docker_host: "{{ docs_vlan_40_address }}"
  state: "{{ cycle_mode.state.containers }}"
  detach: true
  interactive: false
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ names.local_timezone }}"
  ports:
    - "{{ docs_vlan_40_address }}:{{ ports.docs_web }}:8000/tcp"
  volumes: []
  wait_port: "{{ ports.docs_web }}"
