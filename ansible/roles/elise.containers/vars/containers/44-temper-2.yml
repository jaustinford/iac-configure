---
###########################################################
# temper-2
###########################################################

###########################################################
# Record CPU temperature metrics from host and ship to
# Elasticsearch.
###########################################################

container:
  name: temper-2
  image: "{{ nexus_vlan_40_address }}:{{ ports.nexus_docker_hosted }}/elise/temper:main"
  user: "0:{{ assignments.temper_2.uid }}"
  command:
    - python3
    - src
  docker_host: "{{ temper_2_vlan_40_address }}"
  state: started
  restart_policy: unless-stopped
  privileged: false
  detach: true
  interactive: false
  shm_size: "{{ containers_globals.shm_size }}"
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ names.local_timezone }}"
    ELASTICSEARCH_ENDPOINT: "{{ elasticsearch_vlan_40_address }}:{{ ports.elasticsearch_db }}"
    HOST_HOSTNAME: "{{ names.hosts[assignments.temper_2.host] }}.{{ lab.domain }}"
  ports: []
  volumes:
    - "{{ folder_secrets_approle }}/temper.json:/approle/temper.json:ro"
  wait_port: "0"
