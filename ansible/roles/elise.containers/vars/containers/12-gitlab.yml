---
###########################################################
# gitlab
###########################################################

###########################################################
# Web-based DevSecOps platform that provides a
# comprehensive set of tools for the entire software
# development lifecycle. It's built around Git, a
# distributed version control system, and offers features
# for source code management, continuous
# integration/continuous deployment (CI/CD), issue
# tracking, and more.
###########################################################

container:
  name: gitlab
  image: "{{ assignments.nexus.networking.teine.ipv4 }}:{{ external_ports.nexus_docker_proxy }}/gitlab/gitlab-ee:17.5.4-ee.0"
  pull: "{{ containers_globals.pull_images.remote }}"
  command:
    - /assets/wrapper
  docker_host: "{{ assignments.gitlab.networking.teine.ipv4 }}"
  restart_policy: "{{ containers_globals.restart_policy }}"
  detach: "{{ containers_globals.detach }}"
  labels: "{{ containers_globals.labels }}"
  state: "{{ containers_globals.state }}"
  shm_size: 4G
  devices: []
  capabilities: []
  network_mode: "{{ containers_globals.network_mode }}"
  dns_servers: "{{ containers_globals.dns_servers }}"
  dns_search_domains: "{{ containers_globals.dns_search_domains }}"
  env:
    TZ: "{{ containers_globals.env.TZ }}"
    GITLAB_OMNIBUS_CONFIG: external_url "http://gitlab.home.elysianskies.com"
    GITLAB_ROOT_PASSWORD: "{{ secrets.gitlab.user.password }}"
  ports:
    - "{{ assignments.gitlab.networking.teine.ipv4 }}:{{ external_ports.gitlab_web }}:80/tcp"
  volumes:
    - "{{ lab_dirs.application_directory }}/gitlab/config:/etc/gitlab:rw"
    - "{{ lab_dirs.application_directory }}/gitlab/logs:/var/log/gitlab:rw"
    - "{{ lab_dirs.application_directory }}/gitlab/data:/var/opt/gitlab:rw"
  wait_port: "{{ external_ports.gitlab_web }}"
