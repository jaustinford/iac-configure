---
- name: INSTALL - download beat packages
  ansible.builtin.uri:
    url: "{{ beats.download_url }}/{{ item.name }}/{{ item.name }}-{{ lab.elastic_version }}-{{ os_distro }}.deb"
    method: GET
    dest: "/home/{{ names.users.host.iac }}/{{ item.name }}-{{ lab.elastic_version }}-{{ os_distro }}.deb"
    owner: "{{ names.users.host.iac }}"
    group: "{{ names.users.host.iac }}"
    mode: "0660"
    status_code:
      - 200
      - 304

- name: INSTALL - install beat packages
  ansible.builtin.apt:
    deb: "/home/{{ names.users.host.iac }}/{{ item.name }}-{{ lab.elastic_version }}-{{ os_distro }}.deb"
    state: "{{ item.package_state }}"
    update_cache: true
  become: true
