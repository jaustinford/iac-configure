---
output:
  elasticsearch:
    username: elastic
    password: {{ secrets.containers.elasticsearch.elastic }}
    pipeline: lab-geoip-pipeline
{% if ansible_system_vendor == "Linode" %}
    hosts:
      - https://db.proxy-int.{{ lab.domain }}:443

setup:
  dashboards:
    enabled: false
  kibana:
    host: https://data.proxy-int.{{ lab.domain }}:443
{% else %}
    hosts:
      - http://{{ elasticsearch_vlan_40_address }}:{{ ports.elasticsearch_db }}

setup:
  dashboards:
    enabled: true
  kibana:
    host: http://{{ kibana_vlan_40_address }}:{{ ports.kibana_web }}
{% endif %}

logging:
  level: info
  to_files: true
  to_syslog: false
  json: true
  files:
    path: /var/log/metricbeat
    name: metricbeat
    keepfiles: "3"
    permissions: "0644"

metricbeat:
  config:
    modules:
      path: ${path.config}/modules.d/*.yml
  modules:
{% if ansible_system_vendor != "Linode" %}
    - module: docker
      metricsets:
        - container
        - cpu
        - diskio
        - healthcheck
        - info
        - memory
        - network
      hosts:
        - unix://var/run/docker.sock
      period: {{ beats.refresh_interval }}
      enabled: true

{% endif %}
    - module: system
      metricsets:
        - core
        - cpu
        - diskio
        - filesystem
        - fsstat
        - load
        - memory
        - network
        - process
        - process_summary
        - service
        - socket
        - socket_summary
        - uptime
      period: {{ beats.refresh_interval }}
      enabled: true
      processes:
        - .*
      filesystem:
        ignore_types:
          - autofs
          - binfmt_misc
          - bpf
          - cgroup2
          - configfs
          - debugfs
          - devpts
          - devtmpfs
          - efivarfs
          - fusectl
          - hugetlbfs
          - mqueue
          - nsfs
          - overlay
          - proc
          - pstore
          - ramfs
          - rpc_pipefs
          - securityfs
          - squashfs
          - sysfs
          - tmpfs
          - tracefs
          - vfat
      cpu:
        metrics:
          - percentages
          - normalized_percentages
      core:
        metrics:
          - percentages
{% if inventory_hostname == assignments.nginx %}

    - module: nginx
      metricsets:
        - stubstatus
      hosts:
        - https://nginx.proxy-int.{{ lab.domain }}
      period: {{ beats.refresh_interval }}
      enabled: true
{% endif %}
