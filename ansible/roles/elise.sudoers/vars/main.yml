---
sudoers:
  cmd_paths:
    - /bin
    - /usr/bin

  aliases:
    users:
      lab_sudoers:
        - "{{ names.lab_users.privileged }}"

    cmds:
      general_nopasswd:
        - systemctl
        - netstat

      general_restricted:
        - su
        - passwd

      docker_restricted:
        - exec
        - run
        - volume
        - network
        - inspect

      fs_restricted:
        - ls
        - vi
        - vim
        - cat
        - nano
        - less
        - more

    dirs:
      fs_restricted:
        - /etc/sudoers
        - /lab
        - /mnt/dfs_lvm
        - "/mnt/{{ names.raid_vol.name }}"
        - /root
        - /usr/local/etc/sudoers
