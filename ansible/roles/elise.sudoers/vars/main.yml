---
sudoers:
  cmd_paths:
    - /bin
    - /usr/bin

  aliases:
    users:
      lab_sudoers:
        - "{{ names.lab_users.privileged }}"

    cmds:
      general_nopasswd:
        - systemctl
        - netstat

      general_restricted:
        - su
        - passwd

      docker_nopasswd:
        - image ls
        - network ls
        - volume ls
        - events
        - ps
        - logs
        - pull
        - stats
        - top
        - system df

      docker_restricted:
        - inspect
        - image inspect
        - network inspect
        - volume inspect
        - export
        - exec
        - run
        - push
        - rename
        - kill
        - rm
        - rmi
        - system prune

      fs_restricted:
        - ls
        - vi
        - vim
        - cat
        - nano
        - less
        - more

    dirs:
      fs_restricted:
        - /lab
        - /mnt/dfs_lvm
        - "/mnt/{{ names.raid_vol.name }}"
        - /root
        - /etc/sudoers
        - /usr/local/etc/sudoers
