---
ubuntu:
  apt:
    jammy:
      amd64:
        mirror_proxy: "https://artifact.{{ nginx_vlan_40_fqdn }}/repository/lab_apt_jammy_amd64_proxy/"
        mirror_original: http://us.archive.ubuntu.com/ubuntu/

      arm64:
        mirror_proxy: "https://artifact.{{ nginx_vlan_40_fqdn }}/repository/lab_apt_jammy_arm64_proxy/"
        mirror_original: http://ports.ubuntu.com/

  general_packages:
    - name: net-tools
      state: present

    - name: dnsutils
      state: present

    - name: htop
      state: present

    - name: software-properties-common
      state: present

    - name: jq
      state: present

    - name: autossh
      state: present

    - name: cifs-utils
      state: present

    - name: python3-pip
      state: present

    - name: tree
      state: present

  python_packages:
    - name: requests
      state: present
