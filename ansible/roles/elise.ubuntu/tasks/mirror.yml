---
- name: MIRROR - override /etc/apt/sources.list
  ansible.builtin.template:
    src: sources.list
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: '0644'
  vars:
    apt_host: "{{ apt_object.mirror_proxy if discovered_nexus.status == 200 else apt_object.mirror_original }}"
  become: true
