---
- name: APT - create nexus auth file
  ansible.builtin.copy:
    dest: /etc/apt/auth.conf.d/elysianskies_nexus.conf
    content: |
      machine https://nexus.{{ assignments.nginx.networking.teine.fqdn }}
      login {{ secrets.nexus.username }}
      password {{ secrets.nexus.password }}
    owner: root
    group: root
    mode: '0600'
  become: true

- name: APT - override /etc/apt/sources.list
  ansible.builtin.copy:
    dest: /etc/apt/sources.list
    content: |
      deb {{ apt_host }} {{ ubuntu.apt.distro }} main restricted
      deb {{ apt_host }} {{ ubuntu.apt.distro }}-updates main restricted
      deb {{ apt_host }} {{ ubuntu.apt.distro }} universe
      deb {{ apt_host }} {{ ubuntu.apt.distro }}-updates universe
      deb {{ apt_host }} {{ ubuntu.apt.distro }} multiverse
      deb {{ apt_host }} {{ ubuntu.apt.distro }}-updates multiverse
      deb {{ apt_host }} {{ ubuntu.apt.distro }}-backports main restricted universe multiverse
      deb {{ apt_host }} {{ ubuntu.apt.distro }}-security main restricted
      deb {{ apt_host }} {{ ubuntu.apt.distro }}-security universe
      deb {{ apt_host }} {{ ubuntu.apt.distro }}-security multiverse
    owner: root
    group: root
    mode: '0644'
  become: true
