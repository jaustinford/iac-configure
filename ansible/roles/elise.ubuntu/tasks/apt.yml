---
- name: APT - include mirrors tasks
  ansible.builtin.include_tasks: mirrors.yml
  vars:
    apt_host: "{{ apt_object.mirror_proxy if discovered_nexus.status == 200 else apt_object.mirror_original }}"
  when: ansible_system_vendor != "Linode"

- name: APT - include onprem tasks
  ansible.builtin.include_tasks: onprem.yml
  when: cycle_mode.name == "up" and internet_check is defined

- name: APT - include linode tasks
  ansible.builtin.include_tasks: linode.yml
  when: cycle_mode.name == "up" and internet_check is undefined
