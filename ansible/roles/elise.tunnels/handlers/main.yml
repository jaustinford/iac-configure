---
- name: main - systemctl restart tunnel-nginx
  systemd:
    name: tunnel-nginx
    state: restarted
    daemon_reload: yes
  become: true

- name: main - systemctl restart tunnel-openvpnas
  systemd:
    name: tunnel-openvpnas
    state: restarted
    daemon_reload: yes
  become: true

- name: main - systemctl restart tunnel-elasticsearch
  systemd:
    name: tunnel-elasticsearch
    state: restarted
    daemon_reload: yes
  become: true

- name: main - systemctl restart tunnel-kibana
  systemd:
    name: tunnel-kibana
    state: restarted
    daemon_reload: yes
  become: true
