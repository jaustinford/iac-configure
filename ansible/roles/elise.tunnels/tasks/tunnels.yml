---
- name: "TUNNELS - create directory for tunnel-{{ item.name }}"
  ansible.builtin.file:
    state: directory
    path: "/root/tunnel-{{ item.name }}"
    owner: root
    group: root
    mode: '0775'
  become: true
  when: item.host == ansible_hostname + "-teine.home.elysianskies.com"

- name: "TUNNELS - create script for tunnel-{{ item.name }}"
  ansible.builtin.copy:
    content: |
      #!/usr/bin/env bash

      autossh -N -T \
          -o ServerAliveInterval=30 \
          -o ServerAliveCountMax=960 \
          -o ExitOnForwardFailure=yes \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -i /root/ssh.key \
          -R {{ item.external_port }}:{{ item.ipv4 }}:{{ item.internal_port }} \
          root@portal.elysianskies.com
    dest: "/root/tunnel-{{ item.name }}/tunnel-{{ item.name }}.sh"
    owner: root
    group: root
    mode: '0750'
  become: true
  notify: "MAIN - systemctl restart tunnel-{{ item.name }}"
  when: item.host == ansible_hostname + "-teine.home.elysianskies.com"

- name: "TUNNELS - create systemd unit for tunnel-{{ item.name }}"
  ansible.builtin.copy:
    dest: /lib/systemd/system/tunnel-{{ item.name }}.service
    content: |
      [Unit]
      Description={{ item.description }}
      After=network.target auditd.service

      [Service]
      WorkingDirectory=/root/tunnel-{{ item.name }}
      ExecStart=/root/tunnel-{{ item.name }}/tunnel-{{ item.name }}.sh
      KillMode=control-group
      Type=simple
      StandardOutput=append:/dev/null
      StandardError=append:/dev/null

      [Install]
      WantedBy=multi-user.target
      Alias=tunnel-{{ item.name }}.service
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: "MAIN - systemctl restart tunnel-{{ item.name }}"
  when: item.host == ansible_hostname + "-teine.home.elysianskies.com"

- name: MAIN - flush handlers
  ansible.builtin.meta: flush_handlers

- name: "TUNNELS - configure service for tunnel-{{ item.name }}"
  ansible.builtin.systemd:
    name: "tunnel-{{ item.name }}"
    enabled: false
    daemon_reload: true
    state: "{{ item.state }}"
  become: true
  when: item.host == ansible_hostname + "-teine.home.elysianskies.com"
