---
- name: CONTAINERS - apply elise.containers role
  hosts: localhost
  roles:
    - elise.containers
  vars_files:
    - group_vars/all/secrets.yml

- name: CONTAINERS - apply docker prune
  hosts: lab_onprem_docker
  vars_files:
    - group_vars/all/secrets.yml
  tasks:
    - name: CONTAINERS - prune docker resources
      community.docker.docker_prune:
        containers: true
        images: true
        images_filters:
          dangling: false
        networks: true
        volumes: true
        builder_cache: true
      when: cycle_mode.name == "down" and lookup('env', 'DOWN_DESTROY') == "true"
      become: true
