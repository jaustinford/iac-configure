  import_playbook: containers.yml

- name: DOWN - import glusterfs playbook
  import_playbook: glusterfs.yml

- name: DOWN - import mounts playbook
  import_playbook: mounts.yml

- name: DOWN - import linode playbook
  import_playbook: linode.yml

