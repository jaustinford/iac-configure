---
############################################################

ansible_python_interpreter: /usr/bin/python3

# ansible_user: root
# ansible_password: "{{ secrets.users.portal.superuser }}"
# ansible_become_password: "{{ secrets.users.portal.superuser }}"

ansible_user: "{{ names.users.privileged }}"
ansible_password: "{{ secrets.users.portal.privileged }}"
ansible_become_password: "{{ secrets.users.portal.privileged }}"

ansible_ssh_private_key_file: /root/ansible-ssh.key

############################################################

host_users:
  superuser:
    uid: "0"
    home_dir: /root
    group: root

  privileged:
    uid: "32618"
    home_dir: "/home/{{ names.users.privileged }}"
    group: "{{ names.users.privileged }}"

  non_privileged:
    uid: "32619"
    home_dir: "/home/{{ names.users.non_privileged }}"
    group: "{{ names.users.non_privileged }}"
