---
############################################################

ansible_python_interpreter: /usr/bin/python3

ansible_user: "{{ names.users.privileged }}"
ansible_password: "{{ secrets.users.docker00.privileged }}"
ansible_become_password: "{{ secrets.users.docker00.privileged }}"

ansible_ssh_private_key_file: /root/ssh.key

############################################################

host_users:
  superuser:
    uid: "0"
    home_dir: /root
    group: root

  privileged:
    uid: "32614"
    home_dir: "/home/{{ names.users.privileged }}"
    group: "{{ names.users.privileged }}"

  non_privileged:
    uid: "32615"
    home_dir: "/home/{{ names.users.non_privileged }}"
    group: "{{ names.users.non_privileged }}"

poweroff:
  enabled: false

lan_ints:
  vlan_30: enx9c69d3004ff3
  vlan_40: eth0

lazarus_node: true
