---
services:

  ############################################################
  # site
  ############################################################

  site:
    image: docker-hosted.proxy-int.pendragonlab.com/elise/iac-configure:main
    entrypoint:
      - /bin/bash
      - -c
      - |
        /bin/container-init.sh ;
        ansible-playbook \
            /etc/ansible/site.yml \
            -vv

    environment:
      - TZ=America/Denver
      - CYCLE_MODE=${CYCLE_MODE}
      - DOWN_DESTROY=${DOWN_DESTROY}
      - DOWN_POWEROFF=${DOWN_POWEROFF}
      - GLUETUN_EXPRESSVPN_COUNTRIES=${GLUETUN_EXPRESSVPN_COUNTRIES}

    volumes:
      - type: bind
        source: ${USER_APPROLE_FOLDER}
        target: /approle
        read_only: true

      - type: bind
        source: ${USER_AUTOMATION_FOLDER}
        target: /automation
        read_only: true

      - type: bind
        source: ~/.docker
        target: /root/.docker
        read_only: true

    network_mode: host

    logging:
      options:
        max-size: 10m
        max-file: '10'
