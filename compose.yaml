---
services:

  ############################################################
  # site
  ############################################################

  site:
    image: docker-hosted.proxy-int.pendragonlab.com/elise/iac-configure:main
    entrypoint:
      - /bin/bash
      - -c
      - |
        /bin/container-init.sh ;
        ansible-playbook \
            /etc/ansible/site.yml \
            -vv

    profiles:
      - site

    environment:
      - TZ=America/Denver
      - CYCLE_MODE=${CYCLE_MODE}
      - ELISE_PROJECT_CRON_TRIGGER=${ELISE_PROJECT_CRON_TRIGGER}
      - ELISE_PROJECT_EXPRESSVPN_CONTINENT=${ELISE_PROJECT_EXPRESSVPN_CONTINENT}
      - ELISE_PROJECT_EXPRESSVPN_REGION=${ELISE_PROJECT_EXPRESSVPN_REGION}
      - ELISE_PROJECT_EXPRESSVPN_COUNTRY=${ELISE_PROJECT_EXPRESSVPN_COUNTRY}
      - ELISE_PROJECT_EXPRESSVPN_SERVER=${ELISE_PROJECT_EXPRESSVPN_SERVER}

    volumes:
      - type: bind
        source: ${IAC_CONFIGURE_PROJECT_DIR}/approle
        target: /approle
        read_only: true

      - type: bind
        source: ${USER_KEYFOLDER}
        target: /automation
        read_only: true

      - type: bind
        source: ${USER_HOME}/.docker
        target: /root/.docker
        read_only: true

    network_mode: host

    logging:
      options:
        max-size: 10m
        max-file: '10'
