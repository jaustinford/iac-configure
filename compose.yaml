---
services:

  ###########################################################
  # builder
  ###########################################################

  builder:
    build:
      context: .
      tags:
        - nexus-hosted.docker02-teine.home.elysianskies.com/elise/iac-configure:main
    profiles:
      - builder

  ###########################################################
  # playbook_site
  ###########################################################

  playbook_site:
    image: nexus-hosted.docker02-teine.home.elysianskies.com/elise/iac-configure:main
    entrypoint:
      - /bin/bash
      - -c
      - |
        /bin/container-init.sh ;
        ansible-playbook \
            /etc/ansible/site.yml \
            -vv
    profiles:
      - playbook-site

    environment:
      - TZ=America/Denver
      - VAULT_PASSWORD=${VAULT_PASSWORD}
      - B64_SSH_KEY=${B64_SSH_KEY}
      - ELISE_PROJECT_EXPRESSVPN_CONTINENT=north_america
      - ELISE_PROJECT_EXPRESSVPN_REGION=main
      - ELISE_PROJECT_EXPRESSVPN_COUNTRY=united_states
      - ELISE_PROJECT_EXPRESSVPN_SERVER=usa-denver
      - ELISE_PROJECT_MAXMIND_DOWNLOAD=no

    volumes:
      - type: bind
        source: ${USER_HOME}/.docker
        target: /root/.docker
        read_only: true

      - type: volume
        source: tvault
        target: /tfstate
        read_only: false
        volume: 
          subpath: elysianskies/tfstate

    networks:
      - iac_configure

  ###########################################################
  # vault_secrets
  ###########################################################

  vault_secrets:
    image: nexus-hosted.docker02-teine.home.elysianskies.com/elise/iac-configure:main
    entrypoint:
      - /bin/bash
      - -c
      - |
        /bin/container-init.sh ;
        ansible-vault ${VAULT_SECRETS_MODE} \
            /etc/ansible/group_vars/secrets.yml \
            -vv
    profiles:
      - vault-secrets

    environment:
      - TZ=America/Denver
      - VAULT_PASSWORD=${VAULT_PASSWORD}
      - B64_SSH_KEY=${B64_SSH_KEY}

    volumes:
      - type: bind
        source: /c/Users/austin/workspace/git/gitlab.home.elysianskies.com/elise/infrastructure/iac-configure/ansible/group_vars
        target: /etc/ansible/group_vars
        read_only: false

    networks:
      - iac_configure

  ###########################################################
  # ping
  ###########################################################

  ping:
    image: nexus-hosted.docker02-teine.home.elysianskies.com/elise/iac-configure:main
    entrypoint:
      - /bin/bash
      - -c
      - |
        /bin/container-init.sh ;
        ansible all \
          --module-name ansible.builtin.ping \
          -vv
    profiles:
      - ping

    environment:
      - TZ=America/Denver
      - VAULT_PASSWORD=${VAULT_PASSWORD}
      - B64_SSH_KEY=${B64_SSH_KEY}

    networks:
      - iac_configure

  ###########################################################
  # tunnels
  ###########################################################

  tunnels:
    image: nexus-hosted.docker02-teine.home.elysianskies.com/elise/iac-configure:main
    entrypoint:
      - /bin/bash
      - -c
      - |
        /bin/container-init.sh ;
        ansible docker02-teine.home.elysianskies.com --become --module-name systemd --args 'state=${TUNNELS_STATE} name=tunnel-nginx' ;
        ansible docker02-teine.home.elysianskies.com --become --module-name systemd --args 'state=${TUNNELS_STATE} name=tunnel-openvpnas' ;
        ansible docker02-teine.home.elysianskies.com --become --module-name systemd --args 'state=${TUNNELS_STATE} name=tunnel-elasticsearch' ;
        ansible docker01-teine.home.elysianskies.com --become --module-name systemd --args 'state=${TUNNELS_STATE} name=tunnel-kibana'
    profiles:
      - tunnels

    environment:
      - TZ=America/Denver
      - VAULT_PASSWORD=${VAULT_PASSWORD}
      - B64_SSH_KEY=${B64_SSH_KEY}

    networks:
      - iac_configure

  ###########################################################
  # power
  ###########################################################

  power:
    image: nexus-hosted.docker02-teine.home.elysianskies.com/elise/iac-configure:main
    entrypoint:
      - /bin/bash
      - -c
      - |
        /bin/container-init.sh ;
        ansible ${POWER_TARGET_GROUP} \
            --module-name ansible.builtin.${POWER_CYCLE_MODE} \
            --become
    profiles:
      - power

    environment:
      - TZ=America/Denver
      - VAULT_PASSWORD=${VAULT_PASSWORD}
      - B64_SSH_KEY=${B64_SSH_KEY}

    networks:
      - iac_configure

  ###########################################################
  # wake
  ###########################################################

  wake:
    image: nexus-hosted.docker02-teine.home.elysianskies.com/elise/iac-configure:main
    entrypoint:
      - /bin/bash
      - -c
      - |
        /bin/container-init.sh ;
        ansible localhost \
            --module-name community.general.wakeonlan \
            --args "mac='${WAKE_MAC_ADDRESS}' port=9" \
            -vvv
    profiles:
      - wake

    environment:
      - TZ=America/Denver
      - VAULT_PASSWORD=${VAULT_PASSWORD}
      - B64_SSH_KEY=${B64_SSH_KEY}

    network_mode: host

###########################################################
# resources
###########################################################

volumes:
  tvault:
    driver_opts:
      type: cifs
      o: username=${TVAULT_USERNAME},password=${TVAULT_PASSWORD},uid=1000,gid=1000,iocharset=utf8
      device: //172.16.16.4/tvault

networks:
  iac_configure:
    name: iac_configure
